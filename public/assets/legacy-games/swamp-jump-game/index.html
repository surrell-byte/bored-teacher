<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102114" />

    <title>🐸 Froggy Hop</title>

    <!-- FIX: removed inline <style> block — all styles now live in style.css -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Fireflies -->
    <div class="firefly" style="top:10%;left:12%;animation-delay:0s;"></div>
    <div class="firefly" style="top:18%;left:82%;animation-delay:1s;"></div>
    <div class="firefly" style="top:60%;left:8%;animation-delay:2s;"></div>
    <div class="firefly" style="top:72%;left:88%;animation-delay:3s;"></div>
    <div class="firefly" style="top:35%;left:92%;animation-delay:4s;"></div>

    <div class="game-wrapper">

        <!-- HEADER -->
        <div class="game-header">

            <div class="score-display" id="scoreBox">
                <div class="score-label">🍃 Score</div>
                <div class="score-value" id="score">0</div>
            </div>

            <div class="score-display">
                <div class="score-label">🏆 Best</div>
                <div class="score-value" id="bestScore">0</div>
            </div>

        </div>

        <!-- GAME -->
        <!-- FIX: touch-action:none prevents scroll-interference on mobile -->
        <canvas
            id="gameCanvas"
            width="480"
            height="640"
            style="touch-action:none;"
        ></canvas>

        <!-- HINT -->
        <div class="hint" id="hintText">
            🐸 Tap or Press Space to Hop!
        </div>

    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
