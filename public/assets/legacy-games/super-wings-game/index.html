<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Wings Races</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell" aria-label="Super Wings Races">
    <section id="welcomeScreen" class="screen welcome-screen is-active" aria-label="Welcome screen">
      <button class="hotspot welcome-settings" data-action="settings" aria-label="Settings"></button>
      <button class="hotspot welcome-play" data-action="play" aria-label="Play"></button>
      <button class="hotspot welcome-help" data-action="help" aria-label="Help"></button>
    </section>

    <section id="selectScreen" class="screen select-screen" aria-label="Character selection">
      <button class="hotspot select-back" data-action="home" aria-label="Back"></button>
      <button class="hotspot select-settings" data-action="settings" aria-label="Settings"></button>

      <div class="select-status" aria-live="polite">
        <span id="p1Choice">P1: Jett</span>
        <span id="p2Choice">P2: Donnie</span>
      </div>

      <button class="character-pick p1-card p1-red is-selected" data-player="0" data-plane="red" aria-label="Player 1 choose Jett"></button>
      <button class="character-pick p1-card p1-blue" data-player="0" data-plane="blue" aria-label="Player 1 choose Donnie"></button>
      <button class="character-pick p1-card p1-green" data-player="0" data-plane="green" aria-label="Player 1 choose Mira"></button>

      <button class="character-pick p2-card p2-red" data-player="1" data-plane="red" aria-label="Player 2 choose Jett"></button>
      <button class="character-pick p2-card p2-blue is-selected" data-player="1" data-plane="blue" aria-label="Player 2 choose Donnie"></button>
      <button class="character-pick p2-card p2-green" data-player="1" data-plane="green" aria-label="Player 2 choose Mira"></button>

      <button class="hotspot ready-button" data-action="start" aria-label="Ready"></button>
    </section>

    <section id="raceScreen" class="screen race-screen" aria-label="Race board">
      <div class="race-hud" aria-live="polite">
        <div class="player-panel is-turn" id="p1Panel">
          <span>Player 1</span>
          <strong id="p1Name">Jett</strong>
        </div>
        <button id="rollButton" class="roll-button" type="button">
          <span class="roll-icon" id="rollValue">GO</span>
          <span id="rollLabel">ROLL</span>
        </button>
        <div class="player-panel" id="p2Panel">
          <span>Player 2</span>
          <strong id="p2Name">Donnie</strong>
        </div>
      </div>

      <div class="message-pill" id="raceMessage">Player 1, roll to fly!</div>
      <div class="plane-token p1-token" id="p1Token" aria-hidden="true"></div>
      <div class="plane-token p2-token" id="p2Token" aria-hidden="true"></div>
      <button class="small-action race-home" data-action="home" aria-label="Main menu">HOME</button>
    </section>

    <section id="victoryScreen" class="screen victory-screen" aria-label="Victory screen">
      <div class="winner-card" aria-live="polite">
        <span id="winnerName">Player 1 wins!</span>
      </div>
      <button class="hotspot play-again" data-action="restart" aria-label="Play again"></button>
      <button class="hotspot main-menu" data-action="home" aria-label="Main menu"></button>
    </section>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="closeModal" type="button" aria-label="Close">x</button>
        <h2 id="modalTitle">Settings</h2>
        <div id="modalBody"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
