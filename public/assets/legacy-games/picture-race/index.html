<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Race · Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0b0b0f;
            --bg-card: #16161e;
            --bg-card-hover: #1e1e2a;
            --surface-glass: rgba(22, 22, 30, 0.75);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(255, 255, 255, 0.12);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --accent-gold: #e2b04a;
            --accent-gold-light: #f0d078;
            --accent-correct: #3dd68c;
            --accent-correct-bg: rgba(61, 214, 140, 0.10);
            --accent-wrong: #f97066;
            --accent-wrong-bg: rgba(249, 112, 102, 0.10);
            --accent-blue: #5b9cf5;
            --shadow-xl: 0 25px 60px rgba(0, 0, 0, 0.50);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.45);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-button: 0 4px 16px rgba(0, 0, 0, 0.30);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition-smooth: cubic-bezier(0.25, 0.1, 0.1, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-spring: cubic-bezier(0.22, 1.3, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-align: center;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(226, 176, 74, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, rgba(91, 156, 245, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 60%, rgba(61, 214, 140, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 24px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Subtle animated background particles */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(1px 1px at 12% 18%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(1px 1px at 28% 72%, rgba(255, 255, 255, 0.20), transparent),
                radial-gradient(1.5px 1.5px at 55% 35%, rgba(255, 255, 255, 0.22), transparent),
                radial-gradient(1px 1px at 70% 55%, rgba(255, 255, 255, 0.18), transparent),
                radial-gradient(1.5px 1.5px at 85% 15%, rgba(255, 255, 255, 0.20), transparent),
                radial-gradient(1px 1px at 42% 88%, rgba(255, 255, 255, 0.15), transparent),
                radial-gradient(1px 1px at 8% 55%, rgba(255, 255, 255, 0.18), transparent),
                radial-gradient(1.5px 1.5px at 92% 75%, rgba(255, 255, 255, 0.16), transparent);
            animation: starPulse 8s ease-in-out infinite alternate;
        }

        @keyframes starPulse {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            background: var(--surface-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 40px 36px 36px;
            box-shadow: var(--shadow-xl);
            animation: containerEntry 0.7s var(--transition-smooth) forwards;
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
        }

        .main-container.shake {
            animation: shake 0.55s var(--transition-smooth);
            border-color: rgba(249, 112, 102, 0.35);
            box-shadow: var(--shadow-xl), 0 0 80px rgba(249, 112, 102, 0.12);
        }

        .main-container.celebrate {
            border-color: rgba(61, 214, 140, 0.40);
            box-shadow: var(--shadow-xl), 0 0 100px rgba(61, 214, 140, 0.15);
        }

        @keyframes containerEntry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-8px);
            }
            20% {
                transform: translateX(8px);
            }
            30% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            50% {
                transform: translateX(-4px);
            }
            60% {
                transform: translateX(4px);
            }
            70% {
                transform: translateX(-2px);
            }
            80% {
                transform: translateX(2px);
            }
            90% {
                transform: translateX(-1px);
            }
        }

        .game-header {
            margin-bottom: 28px;
        }

        .logo-icon {
            display: inline-block;
            font-size: 48px;
            margin-bottom: 4px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(226, 176, 74, 0.35));
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 700;
            font-size: 32px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin: 0;
            background: linear-gradient(135deg, #f0f0f5 0%, #d4d4e0 40%, #e2b04a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 24px;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-secondary);
            box-shadow: var(--shadow-md);
            transition: all 0.3s var(--transition-smooth);
        }

        .stat-pill .stat-value {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text-primary);
            transition: all 0.3s var(--transition-bounce);
        }

        .stat-pill .stat-value.pop {
            animation: popNumber 0.45s var(--transition-spring);
        }

        @keyframes popNumber {
            0% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.35);
                color: #e2b04a;
            }
            100% {
                transform: scale(1);
            }
        }

        .progress-bar-wrap {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 28px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #e2b04a 0%, #f0d078 50%, #e2b04a 100%);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
            transition: width 0.5s var(--transition-spring);
            box-shadow: 0 0 18px rgba(226, 176, 74, 0.5);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        #objects {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 72px;
            margin: 20px 0 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-md);
            transition: all 0.4s var(--transition-smooth);
            letter-spacing: 6px;
            line-height: 1.2;
            position: relative;
            overflow: hidden;
        }

        #objects::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: radial-gradient(ellipse at center, rgba(226, 176, 74, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        #objects .emoji-span {
            display: inline-block;
            animation: emojiBounce 0.55s var(--transition-spring) forwards;
            position: relative;
            z-index: 1;
        }

        @keyframes emojiBounce {
            0% {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.15) rotate(3deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        #question {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 22px;
            letter-spacing: -0.2px;
            transition: all 0.3s ease;
        }

        #answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            justify-content: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .answer {
            padding: 18px 12px;
            font-size: 26px;
            font-weight: 700;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            letter-spacing: 0.5px;
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow-button);
            transition: all 0.25s var(--transition-smooth);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .answer::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            opacity: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
            transition: opacity 0.3s ease;
        }

        .answer:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.40), 0 0 40px rgba(226, 176, 74, 0.08);
        }

        .answer:hover::before {
            opacity: 1;
        }

        .answer:active {
            transform: scale(0.94);
            transition: transform 0.1s ease;
            box-shadow: var(--shadow-button);
        }

        .answer.correct-flash {
            animation: correctPulse 0.6s var(--transition-smooth);
            border-color: var(--accent-correct) !important;
            background: var(--accent-correct-bg) !important;
            box-shadow: 0 0 50px rgba(61, 214, 140, 0.35) !important;
        }

        .answer.wrong-flash {
            animation: wrongShake 0.5s var(--transition-smooth);
            border-color: var(--accent-wrong) !important;
            background: var(--accent-wrong-bg) !important;
            box-shadow: 0 0 50px rgba(249, 112, 102, 0.35) !important;
        }

        @keyframes correctPulse {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongShake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-7px);
            }
            40% {
                transform: translateX(7px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }

        .answer:disabled {
            pointer-events: none;
            opacity: 0.55;
            cursor: not-allowed;
        }

        #message {
            font-size: 22px;
            margin-top: 24px;
            font-weight: 700;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            min-height: 36px;
            transition: all 0.3s var(--transition-smooth);
            letter-spacing: -0.2px;
        }

        #message.correct-msg {
            color: var(--accent-correct);
            animation: messagePop 0.5s var(--transition-spring);
        }

        #message.wrong-msg {
            color: var(--accent-wrong);
            animation: messagePop 0.5s var(--transition-spring);
        }

        @keyframes messagePop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            60% {
                transform: scale(1.08);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .end-screen {
            animation: fadeInUp 0.6s var(--transition-spring);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-play-again {
            display: inline-block;
            margin-top: 16px;
            padding: 14px 40px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            letter-spacing: 0.3px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #e2b04a 0%, #c98a2a 100%);
            color: #0b0b0f;
            box-shadow: 0 8px 28px rgba(226, 176, 74, 0.35);
            transition: all 0.3s var(--transition-smooth);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-play-again:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(226, 176, 74, 0.50);
            background: linear-gradient(135deg, #f0d078 0%, #d99a30 100%);
        }

        .btn-play-again:active {
            transform: scale(0.93);
            transition: transform 0.1s ease;
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 28px 18px 24px;
                border-radius: var(--radius-lg);
            }
            #objects {
                font-size: 48px;
                min-height: 100px;
                gap: 4px;
                letter-spacing: 3px;
            }
            #answers {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                max-width: 320px;
            }
            .answer {
                padding: 14px 8px;
                font-size: 22px;
                border-radius: var(--radius-sm);
            }
            h1 {
                font-size: 26px;
            }
            .stat-pill {
                padding: 8px 16px;
                font-size: 13px;
            }
            .stat-pill .stat-value {
                font-size: 17px;
            }
            #question {
                font-size: 18px;
            }
            #message {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="main-container" id="mainContainer">
        <div class="game-header">
            <div class="logo-icon">🏁</div>
            <h1>Picture Race</h1>
        </div>

        <div class="stats-row">
            <div class="stat-pill">
                ⭐ Score
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-pill">
                🔢 Round
                <span class="stat-value" id="round">1</span>
                <span style="font-weight:400;color:#6b6b80;">/15</span>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar" style="width: 6.67%;"></div>
        </div>

        <div id="objects"></div>

        <div id="question">How many objects do you see?</div>

        <div id="answers"></div>

        <div id="message"></div>
    </div>

    <script>
        (function() {
            const emojis = ["🍎", "🍌", "⚽", "🐶", "🐱", "🚗", "🚌", "🌞", "🦊", "🐸", "🍕", "🎸"];

            let score = 0;
            let round = 1;
            let correctAnswer = 0;
            let acceptingInput = true;
            const totalRounds = 15;

            const mainContainer = document.getElementById('mainContainer');
            const objectsEl = document.getElementById('objects');
            const answersEl = document.getElementById('answers');
            const messageEl = document.getElementById('message');
            const scoreEl = document.getElementById('score');
            const roundEl = document.getElementById('round');
            const progressBar = document.getElementById('progressBar');
            const questionEl = document.getElementById('question');
            const confettiCanvas = document.getElementById('confetti-canvas');
            const ctx = confettiCanvas.getContext('2d');

            // Confetti system
            let confettiParticles = [];
            let confettiAnimationId = null;

            function resizeCanvas() {
                confettiCanvas.width = window.innerWidth;
                confettiCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class ConfettiParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 8 + 4;
                    this.speedX = (Math.random() - 0.5) * 14;
                    this.speedY = -(Math.random() * 14 + 8);
                    this.gravity = 0.35;
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 12;
                    this.opacity = 1;
                    this.decay = 0.012 + Math.random() * 0.018;
                    this.color = [
                        '#e2b04a', '#f0d078', '#3dd68c', '#5b9cf5',
                        '#f97066', '#c084fc', '#fbbf24', '#34d399',
                        '#f472b6', '#a78bfa'
                    ][Math.floor(Math.random() * 10)];
                }

                update() {
                    this.x += this.speedX;
                    this.speedY += this.gravity;
                    this.y += this.speedY;
                    this.rotation += this.rotationSpeed;
                    this.opacity -= this.decay;
                }

                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, this.opacity);
                    ctx.translate(this.x, this.y);
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.7);
                    ctx.restore();
                }

                isDead() {
                    return this.opacity <= 0;
                }
            }

            function spawnConfetti(originX, originY, count = 60) {
                for (let i = 0; i < count; i++) {
                    confettiParticles.push(new ConfettiParticle(originX, originY));
                }
                if (!confettiAnimationId) {
                    animateConfetti();
                }
            }

            function animateConfetti() {
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                confettiParticles = confettiParticles.filter(p => !p.isDead());
                confettiParticles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                if (confettiParticles.length > 0) {
                    confettiAnimationId = requestAnimationFrame(animateConfetti);
                } else {
                    confettiAnimationId = null;
                    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                }
            }

            function getButtonCenter(button) {
                const rect = button.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }

            function animateScorePop() {
                scoreEl.classList.remove('pop');
                void scoreEl.offsetWidth;
                scoreEl.classList.add('pop');
                scoreEl.textContent = score;
            }

            function updateProgressBar() {
                const percentage = (round / totalRounds) * 100;
                progressBar.style.width = percentage + '%';
            }

            function generateRound() {
                acceptingInput = true;
                messageEl.textContent = '';
                messageEl.className = '';
                mainContainer.classList.remove('shake', 'celebrate');
                questionEl.textContent = 'How many objects do you see?';

                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                const amount = Math.floor(Math.random() * 8) + 1;
                correctAnswer = amount;

                // Build emoji display with spans for animation
                let displayHTML = '';
                for (let i = 0; i < amount; i++) {
                    const delay = i * 0.04;
                    displayHTML +=
                        `<span class="emoji-span" style="animation-delay:${delay}s">${emoji}</span>`;
                }
                objectsEl.innerHTML = displayHTML;

                // Generate options
                const options = [amount];
                while (options.length < 4) {
                    const random = Math.floor(Math.random() * 10) + 1;
                    if (!options.includes(random)) {
                        options.push(random);
                    }
                }
                options.sort(() => Math.random() - 0.5);

                answersEl.innerHTML = '';
                options.forEach(number => {
                    const btn = document.createElement('button');
                    btn.className = 'answer';
                    btn.textContent = number;
                    btn.addEventListener('click', () => checkAnswer(number, btn));
                    answersEl.appendChild(btn);
                });

                updateProgressBar();
            }

            function checkAnswer(choice, clickedBtn) {
                if (!acceptingInput) return;
                acceptingInput = false;

                // Disable all buttons
                const allBtns = answersEl.querySelectorAll('.answer');
                allBtns.forEach(b => b.disabled = true);

                if (choice === correctAnswer) {
                    score += 10;
                    animateScorePop();
                    messageEl.innerHTML = '✅ Correct!';
                    messageEl.className = 'correct-msg';
                    clickedBtn.classList.add('correct-flash');
                    mainContainer.classList.add('celebrate');

                    // Spawn confetti at button position
                    const center = getButtonCenter(clickedBtn);
                    spawnConfetti(center.x, center.y, 50);

                    // Extra confetti from the emoji area
                    const objectsRect = objectsEl.getBoundingClientRect();
                    const objCenterX = objectsRect.left + objectsRect.width / 2;
                    const objCenterY = objectsRect.top + objectsRect.height / 2;
                    setTimeout(() => spawnConfetti(objCenterX, objCenterY, 35), 150);
                } else {
                    messageEl.innerHTML = '❌ Wrong!';
                    messageEl.className = 'wrong-msg';
                    clickedBtn.classList.add('wrong-flash');
                    mainContainer.classList.add('shake');

                    // Highlight correct answer
                    allBtns.forEach(b => {
                        if (parseInt(b.textContent) === correctAnswer) {
                            b.classList.add('correct-flash');
                        }
                    });
                }

                round++;

                if (round > totalRounds) {
                    setTimeout(endGame, 900);
                } else {
                    roundEl.textContent = round;
                    updateProgressBar();
                    setTimeout(generateRound, 950);
                }

                // Remove shake/celebrate classes after animation
                setTimeout(() => {
                    mainContainer.classList.remove('shake', 'celebrate');
                }, 700);
            }

            function endGame() {
                objectsEl.innerHTML = '';
                answersEl.innerHTML = '';
                questionEl.innerHTML = '<span style="font-size:28px;">🏆 Race Complete!</span>';
                messageEl.innerHTML = '';
                messageEl.className = 'end-screen';
                progressBar.style.width = '100%';

                const endHTML = `
                    <div class="end-screen">
                        <div style="font-size:42px;font-weight:800;color:#e2b04a;margin-bottom:6px;">${score} / 150</div>
                        <div style="font-size:16px;color:#a0a0b8;margin-bottom:8px;">
                            ${score >= 130 ? '🏅 Legendary!' : score >= 100 ? '🌟 Amazing!' : score >= 70 ? '👍 Good Job!' : score >= 40 ? '💪 Keep Trying!' : '🌱 Practice Makes Perfect!'}
                        </div>
                        <button class="btn-play-again" onclick="location.reload()">⟳ Play Again</button>
                    </div>
                `;
                messageEl.innerHTML = endHTML;

                // Big confetti burst
                const containerRect = mainContainer.getBoundingClientRect();
                const cx = containerRect.left + containerRect.width / 2;
                const cy = containerRect.top + containerRect.height / 2;
                spawnConfetti(cx, cy, 100);
                setTimeout(() => spawnConfetti(cx - 80, cy - 40, 60), 200);
                setTimeout(() => spawnConfetti(cx + 80, cy - 40, 60), 400);
            }

            // Initial round
            updateProgressBar();
            generateRound();
        })();
    </script>
</body>
</html>
