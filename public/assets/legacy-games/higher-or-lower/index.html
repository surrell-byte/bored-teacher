<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower - Card Game</title>
    <style>
        :root {
            --bg: #1a3c24;
            --table: #1e4d2e;
            --gold: #d4a745;
            --gold-light: #f0d078;
            --card-bg: #ffffff;
            --card-back: #1a3555;
            --text: #f5f0e8;
            --danger: #e74c3c;
            --success: #2ecc71;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(ellipse at center, #1a4d2e 0%, #0f2618 70%, #0a1a10 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Subtle table texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        /* Header */
        .game-header {
            text-align: center;
            margin-bottom: 8px;
        }
        .game-title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--gold-light);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5), 0 0 40px rgba(212, 167, 69, 0.3);
            margin: 0;
            line-height: 1.1;
        }
        .game-subtitle {
            font-size: 0.85rem;
            color: #c4a86c;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            text-align: center;
            flex: 1;
            min-width: 70px;
            backdrop-filter: blur(4px);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b8a88a;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .stat-value.best {
            color: var(--gold-light);
        }
        .stat-value.cards-left {
            color: #a0c8f0;
        }
        .streak-fire {
            display: inline-block;
            animation: flicker 0.6s ease-in-out infinite alternate;
        }
        @keyframes flicker {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.2);
            }
        }

        /* Card area */
        .cards-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            position: relative;
        }
        .card-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b8a88a;
            font-weight: 600;
        }
        .card-wrapper {
            position: relative;
            width: 130px;
            height: 190px;
            perspective: 800px;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        /* Card Front (face up) */
        .card-front {
            background: #fffef9;
            background-image: linear-gradient(135deg, #ffffff 0%, #fafaf5 40%, #f5f2ea 100%);
            border: 3px solid #e0d8c8;
            transform: rotateY(180deg);
            padding: 8px;
        }
        .card-front .card-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 700;
        }
        .card-front .corner-top {
            top: 8px;
            left: 10px;
        }
        .card-front .corner-bottom {
            bottom: 8px;
            right: 10px;
            transform: rotate(180deg);
        }
        .card-front .corner-rank {
            font-size: 1.2rem;
            letter-spacing: -1px;
        }
        .card-front .corner-suit {
            font-size: 0.9rem;
            margin-top: -2px;
        }
        .card-front .center-suit {
            font-size: 3.5rem;
            line-height: 1;
            opacity: 0.85;
        }
        .card-front.red {
            color: #c0392b;
        }
        .card-front.black {
            color: #1a1a1a;
        }
        .card-front.winner-glow {
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.7), 0 0 60px rgba(46, 204, 113, 0.4), var(--card-shadow);
            border-color: #2ecc71;
            animation: glowPulse 0.5s ease-out;
        }
        .card-front.loser-glow {
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.7), 0 0 60px rgba(231, 76, 60, 0.4), var(--card-shadow);
            border-color: #e74c3c;
            animation: glowPulseRed 0.5s ease-out;
        }
        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 10px rgba(46, 204, 113, 0.3), var(--card-shadow);
            }
            100% {
                box-shadow: 0 0 35px rgba(46, 204, 113, 0.8), 0 0 70px rgba(46, 204, 113, 0.5), var(--card-shadow);
            }
        }
        @keyframes glowPulseRed {
            0% {
                box-shadow: 0 0 10px rgba(231, 76, 60, 0.3), var(--card-shadow);
            }
            100% {
                box-shadow: 0 0 35px rgba(231, 76, 60, 0.8), 0 0 70px rgba(231, 76, 60, 0.5), var(--card-shadow);
            }
        }
        /* Card Back */
        .card-back {
            background: #1a3555;
            border: 3px solid #2c5282;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 4px,
                    rgba(255, 255, 255, 0.04) 4px, rgba(255, 255, 255, 0.04) 8px),
                repeating-linear-gradient(-45deg, transparent, transparent 4px,
                    rgba(255, 255, 255, 0.04) 4px, rgba(255, 255, 255, 0.04) 8px),
                radial-gradient(ellipse at center, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-back-inner {
            width: 65%;
            height: 75%;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
        }
        /* Static face-up card (current card) */
        .card-static {
            width: 130px;
            height: 190px;
            border-radius: 12px;
            background: #fffef9;
            background-image: linear-gradient(135deg, #ffffff 0%, #fafaf5 40%, #f5f2ea 100%);
            border: 3px solid #e0d8c8;
            box-shadow: var(--card-shadow);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .card-static .card-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-weight: 700;
        }
        .card-static .corner-top {
            top: 8px;
            left: 10px;
        }
        .card-static .corner-bottom {
            bottom: 8px;
            right: 10px;
            transform: rotate(180deg);
        }
        .card-static .corner-rank {
            font-size: 1.2rem;
            letter-spacing: -1px;
        }
        .card-static .corner-suit {
            font-size: 0.9rem;
            margin-top: -2px;
        }
        .card-static .center-suit {
            font-size: 3.5rem;
            line-height: 1;
            opacity: 0.85;
        }
        .card-static.red {
            color: #c0392b;
        }
        .card-static.black {
            color: #1a1a1a;
        }
        .card-static.fade-update {
            animation: cardFadeUpdate 0.4s ease;
        }
        @keyframes cardFadeUpdate {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            40% {
                transform: scale(0.92);
                opacity: 0.5;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* VS indicator */
        .vs-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }
        .vs-arrow {
            font-size: 1.8rem;
            animation: bounceArrow 1.5s ease-in-out infinite;
        }
        @keyframes bounceArrow {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(6px);
            }
        }

        /* Buttons */
        .buttons-area {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 36px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            outline: none;
            font-family: inherit;
            min-width: 130px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .btn-higher {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }
        .btn-higher:hover:not(:disabled) {
            box-shadow: 0 8px 28px rgba(46, 204, 113, 0.6);
            transform: translateY(-2px);
        }
        .btn-higher:active:not(:disabled) {
            transform: translateY(0) scale(0.96);
        }
        .btn-lower {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }
        .btn-lower:hover:not(:disabled) {
            box-shadow: 0 8px 28px rgba(231, 76, 60, 0.6);
            transform: translateY(-2px);
        }
        .btn-lower:active:not(:disabled) {
            transform: translateY(0) scale(0.96);
        }
        .btn-restart {
            background: linear-gradient(135deg, #8b6914, #b8942c);
            color: #fff;
            box-shadow: 0 6px 20px rgba(180, 140, 50, 0.4);
            letter-spacing: 1px;
        }
        .btn-restart:hover {
            box-shadow: 0 8px 28px rgba(180, 140, 50, 0.6);
            transform: translateY(-2px);
        }

        /* Message */
        .message-area {
            text-align: center;
            min-height: 28px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .message-area.correct {
            color: #2ecc71;
        }
        .message-area.incorrect {
            color: #e74c3c;
        }
        .message-area.neutral {
            color: #c4a86c;
        }

        /* Game Over Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .overlay-content {
            background: linear-gradient(180deg, #1e3a28, #162e1f);
            border: 2px solid rgba(212, 167, 69, 0.4);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .overlay-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .overlay-title.lose {
            color: #e74c3c;
        }
        .overlay-title.win {
            color: #f0d078;
        }
        .overlay-score {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .overlay-score span {
            color: #fff;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .overlay-best {
            font-size: 0.9rem;
            color: #c4a86c;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .overlay-best span {
            color: var(--gold-light);
            font-weight: 700;
        }
        .overlay-message {
            font-size: 0.95rem;
            color: #b8a88a;
            margin-bottom: 20px;
            font-style: italic;
            letter-spacing: 1px;
        }
        .overlay .btn-restart {
            font-size: 1rem;
            padding: 12px 30px;
        }

        /* Confetti particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            font-size: 1.4rem;
            animation: particleFall 1.2s ease-out forwards;
        }
        @keyframes particleFall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(300px) translateX(var(--drift)) rotate(var(--spin)) scale(0.3);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .game-title {
                font-size: 1.7rem;
                letter-spacing: 1px;
            }
            .card-wrapper,
            .card-static {
                width: 105px;
                height: 155px;
            }
            .card-front .center-suit,
            .card-static .center-suit {
                font-size: 2.6rem;
            }
            .card-front .corner-rank,
            .card-static .corner-rank {
                font-size: 1rem;
            }
            .card-front .corner-suit,
            .card-static .corner-suit {
                font-size: 0.7rem;
            }
            .cards-area {
                gap: 10px;
            }
            .btn {
                padding: 12px 24px;
                font-size: 0.95rem;
                min-width: 100px;
                letter-spacing: 1px;
            }
            .buttons-area {
                gap: 10px;
            }
            .stat-item {
                padding: 8px 10px;
            }
            .stat-value {
                font-size: 1.3rem;
            }
            .card-back-inner {
                font-size: 1.8rem;
            }
            .overlay-content {
                padding: 24px 18px;
            }
            .overlay-title {
                font-size: 1.5rem;
            }
        }
        @media (max-width: 350px) {
            .card-wrapper,
            .card-static {
                width: 85px;
                height: 125px;
            }
            .card-front .center-suit,
            .card-static .center-suit {
                font-size: 2rem;
            }
            .card-front .corner-rank,
            .card-static .corner-rank {
                font-size: 0.85rem;
            }
            .card-front .corner-suit,
            .card-static .corner-suit {
                font-size: 0.6rem;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.8rem;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- Header -->
        <div class="game-header">
            <h1 class="game-title">HIGHER or LOWER</h1>
            <p class="game-subtitle">Test Your Intuition</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Best Streak</div>
                <div class="stat-value best" id="bestDisplay">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Cards Left</div>
                <div class="stat-value cards-left" id="cardsLeftDisplay">52</div>
            </div>
        </div>

        <!-- Cards -->
        <div class="cards-area">
            <!-- Current Card (static, face-up) -->
            <div class="card-slot">
                <span class="card-label">Current Card</span>
                <div class="card-static" id="currentCard">
                    <!-- Dynamically filled -->
                </div>
            </div>

            <!-- VS indicator -->
            <div class="vs-indicator">
                <span class="vs-arrow">➤</span>
                <span>VS</span>
            </div>

            <!-- Next Card (flippable, starts face-down) -->
            <div class="card-slot">
                <span class="card-label">Next Card</span>
                <div class="card-wrapper" id="nextCardWrapper">
                    <div class="card-inner" id="nextCardInner">
                        <!-- Front (face up) -->
                        <div class="card-face card-front" id="nextCardFront">
                            <!-- Dynamically filled -->
                        </div>
                        <!-- Back (face down) -->
                        <div class="card-face card-back">
                            <div class="card-back-inner">🂠</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons-area">
            <button class="btn btn-higher" id="btnHigher" title="Guess Higher (H or ↑ key)">
                ▲ Higher
            </button>
            <button class="btn btn-lower" id="btnLower" title="Guess Lower (L or ↓ key)">
                ▼ Lower
            </button>
        </div>

        <!-- Message -->
        <div class="message-area neutral" id="messageArea">Make your guess!</div>

        <!-- Restart button (shown during game) -->
        <div style="text-align:center; margin-top: 8px;">
            <button class="btn btn-restart" id="btnRestart" style="font-size:0.85rem; padding:10px 24px; min-width:auto;">
                🔄 New Game
            </button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <div class="overlay-title lose" id="overlayTitle">Game Over!</div>
            <div class="overlay-score">Final Streak: <span id="overlayScore">0</span></div>
            <div class="overlay-best">Best Streak: <span id="overlayBest">0</span></div>
            <div class="overlay-message" id="overlayMessage">Better luck next time!</div>
            <button class="btn btn-restart" id="btnOverlayRestart">🔄 Play Again</button>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // DOM References
            // ──────────────────────────────────────
            const currentCardEl = document.getElementById('currentCard');
            const nextCardWrapper = document.getElementById('nextCardWrapper');
            const nextCardInner = document.getElementById('nextCardInner');
            const nextCardFront = document.getElementById('nextCardFront');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const bestDisplay = document.getElementById('bestDisplay');
            const cardsLeftDisplay = document.getElementById('cardsLeftDisplay');
            const messageArea = document.getElementById('messageArea');
            const btnHigher = document.getElementById('btnHigher');
            const btnLower = document.getElementById('btnLower');
            const btnRestart = document.getElementById('btnRestart');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlayScore = document.getElementById('overlayScore');
            const overlayBest = document.getElementById('overlayBest');
            const overlayMessage = document.getElementById('overlayMessage');
            const btnOverlayRestart = document.getElementById('btnOverlayRestart');

            // ──────────────────────────────────────
            // Game State
            // ──────────────────────────────────────
            const state = {
                deck: [],
                currentCard: null,
                nextCard: null,
                score: 0,
                bestScore: 0,
                allTimeBest: 0,
                gameOver: false,
                waitingForGuess: false,
                cardsDrawn: 0,
            };

            // Load all-time best from localStorage
            try {
                const saved = localStorage.getItem('higherLower_bestScore');
                if (saved !== null) {
                    state.allTimeBest = parseInt(saved, 10) || 0;
                }
            } catch (e) {
                state.allTimeBest = 0;
            }

            // ──────────────────────────────────────
            // Card Data
            // ──────────────────────────────────────
            const suits = [
                { name: 'hearts', symbol: '♥', color: 'red' },
                { name: 'diamonds', symbol: '♦', color: 'red' },
                { name: 'clubs', symbol: '♣', color: 'black' },
                { name: 'spades', symbol: '♠', color: 'black' },
            ];

            const ranks = [
                { name: 'A', value: 1 },
                { name: '2', value: 2 },
                { name: '3', value: 3 },
                { name: '4', value: 4 },
                { name: '5', value: 5 },
                { name: '6', value: 6 },
                { name: '7', value: 7 },
                { name: '8', value: 8 },
                { name: '9', value: 9 },
                { name: '10', value: 10 },
                { name: 'J', value: 11 },
                { name: 'Q', value: 12 },
                { name: 'K', value: 13 },
            ];

            function createDeck() {
                const deck = [];
                for (const suit of suits) {
                    for (const rank of ranks) {
                        deck.push({
                            rank: rank.name,
                            value: rank.value,
                            suit: suit.name,
                            symbol: suit.symbol,
                            color: suit.color,
                        });
                    }
                }
                return deck;
            }

            function shuffleDeck(deck) {
                const arr = [...deck];
                // Fisher-Yates shuffle
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function drawCard() {
                if (state.deck.length === 0) return null;
                return state.deck.pop();
            }

            // ──────────────────────────────────────
            // Card Rendering
            // ──────────────────────────────────────
            function renderCardHTML(card) {
                if (!card) return '';
                const colorClass = card.color === 'red' ? 'red' : 'black';
                return `
                    <div class="card-corner corner-top">
                        <span class="corner-rank">${card.rank}</span>
                        <span class="corner-suit">${card.symbol}</span>
                    </div>
                    <span class="center-suit">${card.symbol}</span>
                    <div class="card-corner corner-bottom">
                        <span class="corner-rank">${card.rank}</span>
                        <span class="corner-suit">${card.symbol}</span>
                    </div>
                `;
            }

            function updateCurrentCardDisplay(card) {
                if (!card) {
                    currentCardEl.innerHTML = '';
                    currentCardEl.className = 'card-static';
                    return;
                }
                const colorClass = card.color === 'red' ? 'red' : 'black';
                currentCardEl.className = `card-static ${colorClass}`;
                currentCardEl.innerHTML = renderCardHTML(card);
            }

            function updateNextCardFront(card) {
                if (!card) {
                    nextCardFront.innerHTML = '';
                    nextCardFront.className = 'card-face card-front';
                    return;
                }
                const colorClass = card.color === 'red' ? 'red' : 'black';
                nextCardFront.className = `card-face card-front ${colorClass}`;
                nextCardFront.innerHTML = renderCardHTML(card);
            }

            function resetNextCardFaceDown() {
                nextCardInner.classList.remove('flipped');
                // Remove glow classes
                nextCardFront.classList.remove('winner-glow', 'loser-glow');
            }

            function flipNextCard() {
                nextCardInner.classList.add('flipped');
            }

            // ──────────────────────────────────────
            // UI Updates
            // ──────────────────────────────────────
            function updateStats() {
                scoreDisplay.textContent = state.score;
                const bestToShow = Math.max(state.bestScore, state.allTimeBest);
                bestDisplay.textContent = bestToShow;
                cardsLeftDisplay.textContent = state.deck.length;
            }

            function setMessage(text, type) {
                messageArea.textContent = text;
                messageArea.className = 'message-area';
                if (type === 'correct') messageArea.classList.add('correct');
                else if (type === 'incorrect') messageArea.classList.add('incorrect');
                else messageArea.classList.add('neutral');
            }

            function setButtonsEnabled(enabled) {
                btnHigher.disabled = !enabled;
                btnLower.disabled = !enabled;
            }

            // ──────────────────────────────────────
            // Particles
            // ──────────────────────────────────────
            function spawnParticles(count, type) {
                const emojis = type === 'win' ?
                    ['✨', '🌟', '💫', '🎉', '🔥', '💎', '⭐', '⚡'] :
                    ['💨', '💔', '😢'];
                const container = document.body;

                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('span');
                    particle.className = 'particle';
                    particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    particle.style.left = `${40 + Math.random() * 20}%`;
                    particle.style.top = `${25 + Math.random() * 15}%`;
                    particle.style.setProperty('--drift', `${(Math.random() - 0.5) * 250}px`);
                    particle.style.setProperty('--spin', `${(Math.random() - 0.5) * 720}deg`);
                    particle.style.animationDuration = `${0.8 + Math.random() * 1.4}s`;
                    particle.style.fontSize = `${1 + Math.random() * 1.8}rem`;
                    container.appendChild(particle);

                    // Remove after animation
                    setTimeout(() => {
                        if (particle.parentNode) particle.parentNode.removeChild(particle);
                    }, 1600);
                }
            }

            // ──────────────────────────────────────
            // Game Logic
            // ──────────────────────────────────────
            function initGame() {
                state.deck = shuffleDeck(createDeck());
                state.score = 0;
                state.gameOver = false;
                state.waitingForGuess = false;
                state.cardsDrawn = 0;
                state.currentCard = null;
                state.nextCard = null;

                // Draw first two cards
                state.currentCard = drawCard();
                state.nextCard = drawCard();
                state.cardsDrawn = 2;

                // Update UI
                updateCurrentCardDisplay(state.currentCard);
                updateNextCardFront(state.nextCard);
                resetNextCardFaceDown();
                updateStats();
                setMessage('Make your guess!', 'neutral');
                setButtonsEnabled(true);

                // Hide overlay
                overlay.classList.remove('active');

                // Remove any leftover glows
                nextCardFront.classList.remove('winner-glow', 'loser-glow');
                currentCardEl.classList.remove('fade-update');

                state.waitingForGuess = true;
            }

            function handleGuess(guess) {
                if (!state.waitingForGuess || state.gameOver) return;
                if (!state.currentCard || !state.nextCard) return;

                state.waitingForGuess = false;
                setButtonsEnabled(false);

                // Flip the next card
                flipNextCard();

                const currentValue = state.currentCard.value;
                const nextValue = state.nextCard.value;
                let isCorrect = false;

                if (guess === 'higher') {
                    isCorrect = nextValue > currentValue;
                } else if (guess === 'lower') {
                    isCorrect = nextValue < currentValue;
                }

                // Wait for flip animation to complete
                setTimeout(() => {
                    if (isCorrect) {
                        // Correct!
                        state.score++;
                        if (state.score > state.bestScore) {
                            state.bestScore = state.score;
                        }
                        if (state.score > state.allTimeBest) {
                            state.allTimeBest = state.score;
                            try {
                                localStorage.setItem('higherLower_bestScore', state.allTimeBest);
                            } catch (e) { /* ignore */ }
                        }
                        updateStats();
                        setMessage('✅ Correct! Well done!', 'correct');
                        nextCardFront.classList.add('winner-glow');
                        spawnParticles(8, 'win');

                        // Check if deck is empty
                        if (state.deck.length === 0) {
                            // Player exhausted the deck - incredible!
                            setTimeout(() => {
                                endGame(true);
                            }, 1000);
                            return;
                        }

                        // Transition to next round
                        setTimeout(() => {
                            // Move next card to current
                            state.currentCard = state.nextCard;
                            updateCurrentCardDisplay(state.currentCard);
                            currentCardEl.classList.add('fade-update');
                            setTimeout(() => currentCardEl.classList.remove('fade-update'), 400);

                            // Draw new next card
                            state.nextCard = drawCard();
                            state.cardsDrawn++;
                            updateNextCardFront(state.nextCard);
                            resetNextCardFaceDown();
                            nextCardFront.classList.remove('winner-glow');
                            updateStats();
                            setMessage('Make your guess!', 'neutral');
                            setButtonsEnabled(true);
                            state.waitingForGuess = true;
                        }, 900);
                    } else {
                        // Incorrect or tie
                        setMessage('❌ Wrong! Game Over.', 'incorrect');
                        nextCardFront.classList.add('loser-glow');
                        updateStats();
                        spawnParticles(4, 'lose');

                        setTimeout(() => {
                            endGame(false);
                        }, 1000);
                    }
                }, 650); // Slightly after flip animation ends
            }

            function endGame(deckExhausted) {
                state.gameOver = true;
                state.waitingForGuess = false;
                setButtonsEnabled(false);

                const finalScore = state.score;
                const bestToShow = Math.max(state.bestScore, state.allTimeBest);

                overlayScore.textContent = finalScore;
                overlayBest.textContent = bestToShow;

                if (deckExhausted) {
                    overlayTitle.textContent = '🏆 INCREDIBLE! 🏆';
                    overlayTitle.className = 'overlay-title win';
                    overlayMessage.textContent = 'You exhausted the entire deck! You\'re a legend!';
                    spawnParticles(25, 'win');
                } else if (finalScore >= 15) {
                    overlayTitle.textContent = 'AMAZING!';
                    overlayTitle.className = 'overlay-title win';
                    overlayMessage.textContent = 'You\'re a card shark! Incredible streak!';
                } else if (finalScore >= 10) {
                    overlayTitle.textContent = 'Impressive!';
                    overlayTitle.className = 'overlay-title win';
                    overlayMessage.textContent = 'You\'re on fire! Great instincts!';
                } else if (finalScore >= 7) {
                    overlayTitle.textContent = 'Well Done!';
                    overlayTitle.className = 'overlay-title win';
                    overlayMessage.textContent = 'Solid streak! Keep it up!';
                } else if (finalScore >= 4) {
                    overlayTitle.textContent = 'Not Bad!';
                    overlayTitle.className = 'overlay-title lose';
                    overlayMessage.textContent = 'You\'re getting the hang of it!';
                } else if (finalScore >= 2) {
                    overlayTitle.textContent = 'Game Over!';
                    overlayTitle.className = 'overlay-title lose';
                    overlayMessage.textContent = 'A decent start. Try again!';
                } else {
                    overlayTitle.textContent = 'Game Over!';
                    overlayTitle.className = 'overlay-title lose';
                    overlayMessage.textContent = 'Better luck next time! The cards can be tricky.';
                }

                overlay.classList.add('active');
            }

            function restartGame() {
                // Save best score
                if (state.bestScore > state.allTimeBest) {
                    state.allTimeBest = state.bestScore;
                    try {
                        localStorage.setItem('higherLower_bestScore', state.allTimeBest);
                    } catch (e) { /* ignore */ }
                }
                initGame();
            }

            // ──────────────────────────────────────
            // Event Listeners
            // ──────────────────────────────────────
            btnHigher.addEventListener('click', () => handleGuess('higher'));
            btnLower.addEventListener('click', () => handleGuess('lower'));
            btnRestart.addEventListener('click', restartGame);
            btnOverlayRestart.addEventListener('click', restartGame);

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (state.gameOver) {
                    if (e.key === ' ' || e.key === 'Enter' || e.key === 'r' || e.key === 'R') {
                        e.preventDefault();
                        restartGame();
                    }
                    return;
                }
                if (!state.waitingForGuess) return;

                if (e.key === 'ArrowUp' || e.key === 'h' || e.key === 'H') {
                    e.preventDefault();
                    handleGuess('higher');
                } else if (e.key === 'ArrowDown' || e.key === 'l' || e.key === 'L') {
                    e.preventDefault();
                    handleGuess('lower');
                }
            });

            // Close overlay by clicking outside (optional)
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    restartGame();
                }
            });

            // ──────────────────────────────────────
            // Initialize
            // ──────────────────────────────────────
            initGame();

            console.log('🃏 Higher or Lower - Card Game Ready!');
            console.log('   Use ▲/▼ buttons, arrow keys, or H/L keys to play.');
            console.log('   All-time best streak:', state.allTimeBest);
        })();
    </script>
</body>
</html>
