<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Emoji Match · Memory Game + Big Numbers</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .game-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 24px 20px 32px 20px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s;
      position: relative;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #FFE6B0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .stats-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      background: #0f172aee;
      padding: 12px 24px;
      border-radius: 60px;
      margin: 12px 12px 20px 12px;
      backdrop-filter: blur(4px);
      border: 1px solid #334155;
    }

    .move-counter {
      background: #2d3a5e;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.5rem;
      color: #facc15;
      font-family: monospace;
      letter-spacing: 1px;
      box-shadow: inset 0 0 4px #00000033, 0 4px 8px rgba(0,0,0,0.2);
    }

    .move-label {
      font-size: 1rem;
      font-weight: 600;
      color: #cbd5e6;
      letter-spacing: 1px;
      background: #1e293b;
      padding: 6px 16px;
      border-radius: 30px;
    }

    .restart-btn {
      background: #ff9800;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 24px;
      border-radius: 40px;
      cursor: pointer;
      color: #0f172a;
      transition: all 0.2s ease;
      box-shadow: 0 5px 0 #b45f06;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .restart-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b45f06;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(85px, 110px));
      gap: 14px;
      justify-content: center;
      margin: 15px 0 20px 0;
      padding: 6px;
    }

    .card {
      position: relative;   /* for absolute positioning of card number */
      aspect-ratio: 1 / 1;
      width: 100%;
      background: linear-gradient(145deg, #3b82f6, #1e4a8a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      cursor: pointer;
      border-radius: 24px;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 12px 18px -6px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      color: transparent;  /* hide emoji initially */
      border: 1px solid rgba(255,255,240,0.3);
      transform: scale(1);
    }

    /* BIGGER CARD NUMBER BADGE */
    .card-number {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 1.3rem;      /* much bigger than before */
      font-weight: bold;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.45);
      padding: 4px 10px;
      border-radius: 32px;
      font-family: monospace;
      backdrop-filter: blur(4px);
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.1s;
      letter-spacing: 1px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    /* Hide number when card is flipped or matched */
    .card.flipped .card-number,
    .card.matched .card-number {
      display: none;
    }

    .card.flipped {
      background: white;
      color: #1e293b;
      border: 2px solid #facc15;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      transform: scale(0.98);
    }

    /* matched cards: visible but "locked" with friendly green style */
    .card.matched {
      background: #4caf7f;
      background: linear-gradient(135deg, #4caf7f, #2e7d5e);
      color: white;
      border: 1px solid #c6ffbc;
      cursor: default;
      pointer-events: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-shadow: 0 1px 1px darkgreen;
      transform: scale(0.96);
    }

    .card.matched.flipped {
      background: #4caf7f;
      color: #f9f7f3;
    }

    .card:active:not(.matched):not(.flipped) {
      transform: scale(0.94);
      transition: 0.05s linear;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 8px;
    }

    /* ========== WIN MODAL STYLES ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      padding: 32px 28px;
      border-radius: 48px;
      text-align: center;
      color: #f1f5f9;
      border: 2px solid #facc15;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
      width: 280px;
      animation: modalPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    @keyframes modalPop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-content h2 {
      font-size: 2rem;
      margin: 0 0 16px 0;
      background: linear-gradient(135deg, #FFD966, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .modal-content p {
      font-size: 1.4rem;
      margin: 12px 0;
      background: #0f172a;
      display: inline-block;
      padding: 10px 24px;
      border-radius: 60px;
      letter-spacing: 1px;
    }

    #final-moves {
      font-weight: bold;
      color: #facc15;
      font-size: 2rem;
      margin-left: 6px;
    }

    .modal-content button {
      background: #facc15;
      border: none;
      padding: 12px 28px;
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      color: #0f172a;
      transition: all 0.2s;
      box-shadow: 0 6px 0 #b45f06;
    }

    .modal-content button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #b45f06;
    }

    /* Responsive: slightly smaller numbers on mobile but still bigger than before */
    @media (max-width: 500px) {
      .grid {
        grid-template-columns: repeat(4, minmax(70px, 85px));
        gap: 10px;
      }
      .card {
        font-size: 2rem;
        border-radius: 18px;
      }
      .move-counter {
        font-size: 1.2rem;
        padding: 4px 14px;
      }
      .stats-panel {
        padding: 8px 16px;
      }
      .card-number {
        font-size: 1rem;   /* still bigger than default 0.8rem */
        top: 5px;
        left: 8px;
        padding: 2px 8px;
      }
    }
  </style>
</head>
<body>

<div class="game-container">
  <h2>🐣 EMOJI MATCH</h2>
  <div class="stats-panel">
    <span class="move-label">🎯 MOVES</span>
    <span class="move-counter" id="moveCountDisplay">0</span>
    <button class="restart-btn" id="restartButton">⟳ NEW GAME</button>
  </div>
  <div id="game-board" class="grid"></div>
  <footer>✨ match pairs · big numbered cards ✨</footer>

  <!-- WIN MODAL (hidden by default) -->
  <div id="win-modal" class="modal">
    <div class="modal-content">
      <h2>🎉 YOU WIN! 🎉</h2>
      <p>Total moves: <span id="final-moves">0</span></p>
      <button id="modalPlayAgainBtn">PLAY AGAIN</button>
    </div>
  </div>
</div>

<script>
  // ---------- EMOJI POOL (8 pairs => 16 cards) ----------
  const emojis = ['🦓', '🐬', '🦈', '🐈', '🥐', '🐅', '🍕', '🦒'];
  
  // Game state variables
  let gameItems = [];           // shuffled card values (emoji strings)
  let flippedCards = [];       // stores DOM elements of currently flipped (unmatched) cards
  let matchedCount = 0;        // number of matched cards (total matched pairs count * 2)
  let moveCount = 0;           // move counter: each attempt (pair flip) increases by 1
  let lockBoard = false;       // avoids clicks during animation
  let timeoutId = null;        // timeout reference for match check
  
  const board = document.getElementById('game-board');
  const moveDisplay = document.getElementById('moveCountDisplay');
  const restartBtn = document.getElementById('restartButton');
  
  // Modal elements
  const winModal = document.getElementById('win-modal');
  const finalMovesSpan = document.getElementById('final-moves');
  const modalPlayBtn = document.getElementById('modalPlayAgainBtn');
  
  // Helper: update move counter UI
  function updateMoveUI() {
    moveDisplay.textContent = moveCount;
  }
  
  // Helper: increment move counter (called each VALID attempt: after two cards flipped)
  function incrementMove() {
    moveCount++;
    updateMoveUI();
  }
  
  // Fisher-Yates shuffle for true randomness
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  
  // Show win modal with current move count
  function showWinModal() {
    if (finalMovesSpan) {
      finalMovesSpan.innerText = moveCount;
    }
    winModal.classList.add('show');
  }
  
  // Hide win modal
  function hideModal() {
    winModal.classList.remove('show');
  }
  
  // Complete game reset (new shuffled board, moves reset, modal hidden, pending timeouts cleared)
  function restartGame() {
    // Cancel pending timeout to avoid state corruption
    if (timeoutId) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    // Reset locks and flip buffer
    lockBoard = false;
    flippedCards = [];
    // Hide modal if it's displayed
    hideModal();
    // Re-initialize everything (new shuffle, fresh board, moves = 0)
    initGame();
  }
  
  // Initialize / reset game board (create shuffled deck, build grid, reset globals)
  function initGame() {
    // 1. Create paired array and shuffle
    gameItems = [...emojis, ...emojis];   // two copies = pairs
    gameItems = shuffleArray(gameItems);   // random order
    
    // 2. Reset state variables
    flippedCards = [];
    matchedCount = 0;
    moveCount = 0;
    lockBoard = false;
    updateMoveUI();
    
    // 3. Clear board container
    board.innerHTML = '';
    
    // 4. Create card elements dynamically with numbers (1..16) - BIG NUMBERS
    gameItems.forEach((emoji, idx) => {
      const card = document.createElement('div');
      card.classList.add('card');
      
      // Create number label (index + 1) with enhanced visibility
      const numberLabel = document.createElement('span');
      numberLabel.classList.add('card-number');
      numberLabel.innerText = idx + 1;    // 1-based index for clarity
      
      // Add number label to card
      card.appendChild(numberLabel);
      
      // Add emoji as text node (will be hidden via color: transparent initially)
      const emojiTextNode = document.createTextNode(emoji);
      card.appendChild(emojiTextNode);
      
      // Store emoji value in dataset for matching
      card.setAttribute('data-value', emoji);
      card.setAttribute('data-idx', idx);
      
      // attach click listener
      card.addEventListener('click', onCardClick);
      board.appendChild(card);
    });
  }
  
  // Function that handles card click (flipping logic)
  function onCardClick(event) {
    const card = event.currentTarget;
    
    // CONDITIONS to block interaction:
    if (lockBoard) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;
    if (flippedCards.length >= 2) return;
    
    // Flip current card (visual)
    card.classList.add('flipped');
    // Add to flipped pool
    flippedCards.push(card);
    
    // After two cards are flipped: we need to evaluate match and increment move
    if (flippedCards.length === 2) {
      // Block any additional clicks while checking match / animation
      lockBoard = true;
      
      // Increment move counter (valid attempt)
      incrementMove();
      
      // Delay evaluation so player can see the second card (550ms)
      timeoutId = setTimeout(() => {
        checkMatchAndReset();
        timeoutId = null;
      }, 550);
    }
  }
  
  // Core matching logic: compare two flipped cards, handle match/mismatch, reset state
  function checkMatchAndReset() {
    // Sanity check: make sure we have exactly 2 cards in flipped pool
    if (flippedCards.length !== 2) {
      // Edge case: clear and unlock
      flippedCards.forEach(card => {
        if (card && !card.classList.contains('matched')) {
          card.classList.remove('flipped');
        }
      });
      flippedCards = [];
      lockBoard = false;
      return;
    }
    
    const cardA = flippedCards[0];
    const cardB = flippedCards[1];
    const valueA = cardA.getAttribute('data-value');
    const valueB = cardB.getAttribute('data-value');
    
    const isMatch = (valueA === valueB);
    
    if (isMatch) {
      // MATCH success: mark both as matched
      cardA.classList.add('matched');
      cardB.classList.add('matched');
      matchedCount += 2;
      
      // Victory check: all cards matched (total 16 cards)
      if (matchedCount === gameItems.length) {
        // Small delay to let final matched style appear, then show modal
        setTimeout(() => {
          showWinModal();
        }, 80);
      }
    } else {
      // MISMATCH: flip them back
      cardA.classList.remove('flipped');
      cardB.classList.remove('flipped');
    }
    
    // Clear the flippedCards array (both matched or mismatched)
    flippedCards = [];
    
    // Unlock the board so new clicks are allowed
    lockBoard = false;
  }
  
  // ---- Event listeners for restart & modal button ----
  restartBtn.addEventListener('click', () => {
    restartGame();
  });
  
  // When modal's "PLAY AGAIN" is clicked, restart the game and also close modal
  if (modalPlayBtn) {
    modalPlayBtn.addEventListener('click', () => {
      restartGame();
    });
  }
  
  // Optional: clicking on modal background does nothing (prevents accidental closure)
  winModal.addEventListener('click', (e) => {
    if (e.target === winModal) {
      // Do nothing – user must click PLAY AGAIN
    }
  });
  
  // ---- Start the game on page load ----
  initGame();
</script>
</body>
</html>
