<html lang="en">
<head>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1b3a1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Segoe UI', 'Poppins', 'Comic Sans MS', cursive, sans-serif;

    .screen {
      background: #fffef8;
      border-radius: 28px;
      padding: 32px;

      color: #2e7d32;
      margin-bottom: 12px;
    }

      border: 2px solid #a5d6a7;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;

      margin-bottom: 12px;
      outline: none;
      font-family: inherit;

    input:focus {
      border-color: #2e7d32;

      border-radius: 50px;

      cursor: pointer;
      font-weight: 600;

    }

    .btn:hover {
      background: #1b5e20;
      transform: scale(1.02);
    }

    .btn:active {

    }

    .btn:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }

      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 10px 16px;

      border-radius: 50px;
      color: white;

      font-size: 1.4rem;

      color: #a5d6a7;

      color: #1b5e20;

      color: #888;
      margin-top: 4px;

      margin-top: 16px;
    }

    .opt {
      background: white;
      border: 2px solid #c8e6c9;
      border-radius: 16px;
      padding: 12px 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      font-weight: 600;
      color: #2e7d32;
      font-family: inherit;
    }

    .opt:hover {
      border-color: #2e7d32;
      background: #e8f5e9;
      transform: scale(1.02);
    }

    .opt:active {
      transform: scale(0.97);
    }

    .opt.wrong {
      background: #ffebee;
      border-color: #e57373;
      color: #c62828;
    }

    .opt.right {
      background: #e8f5e9;

      color: #2e7d32;
    }

      background: #e8f5e9;

      border-radius: 50px;
      padding: 14px 28px;

      cursor: pointer;
      font-weight: 600;
      margin: 8px;

      transform: scale(1.02);
    }

    }

      opacity: 0.4;
      cursor: default;
    }

    .progress {
      font-size: 0.8rem;
      color: #888;
      text-align: right;
      margin-bottom: 8px;

      margin-top: 20px;
      font-size: 0.7rem;
      text-align: center;
      color: #90a4ae;

<script>
(function() {
  'use strict';

  var HUB_URL = '/hub';
  var LS_KEY  = 'eslhub_data';
  var _muted  = false;

  // ── Detect audio elements and show mute button ───────────────
  window.addEventListener('DOMContentLoaded', function() {
    var audioEls = document.querySelectorAll('audio, video');
    if (audioEls.length > 0) {
      document.getElementById('gb-mute').style.display = 'flex';
    }
    // Respect hub's sound setting
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (data.sound === false) {
        _muted = true;
        _applyMute(true);
        document.getElementById('gb-mute').textContent = '🔇 Muted';
      }
    } catch(e) {}
  });

  function _applyMute(muted) {
    var audioEls = document.querySelectorAll('audio, video');
    audioEls.forEach(function(el) { el.muted = muted; });
    // Also set global flag many games check
    if (typeof window.soundEnabled !== 'undefined') window.soundEnabled = !muted;
    if (typeof window.audioEnabled !== 'undefined') window.audioEnabled = !muted;
    if (typeof window.muteSound   !== 'undefined') window.muteSound    = muted;
  }

  // ── XP calculation ───────────────────────────────────────────
  function _calcXP(score, accuracy) {
    var base = Math.min(Math.floor(score / 10), 30);
    var accBonus = accuracy >= 90 ? 20 : accuracy >= 70 ? 10 : accuracy >= 50 ? 5 : 0;
    return Math.max(base + accBonus, 5); // minimum 5 XP for completing
  }

  // ── Save score to localStorage (eslhub_data) ─────────────────
  function _saveScore(gameId, score, accuracy, questions) {
    try {
      var raw  = localStorage.getItem(LS_KEY);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.games) data.games = {};
      var prev = data.games[gameId] || { highScore: 0, completions: 0, lastAccuracy: 0, totalQuestions: 100 };

      data.games[gameId] = {
        highScore:      Math.max(prev.highScore || 0, score),
        completions:    (prev.completions || 0) + 1,
        lastAccuracy:   accuracy,
        totalQuestions: questions || 100,
      };

      // Add XP + coins
      var xpEarned = _calcXP(score, accuracy);
      data.xp     = (data.xp     || 0) + xpEarned;
      data.coins  = (data.coins  || 0) + Math.floor(xpEarned / 2);
      data.lastGame = gameId;

      // Level up check
      var level = data.level || 1;
      var xp    = data.xp;
      function xpForLevel(l) { return 100 + (l - 1) * 50; }
      while (xp >= xpForLevel(level)) { xp -= xpForLevel(level); level++; }
      data.level = level;
      data.xp    = xp;

      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return xpEarned;
    } catch(e) {
      console.warn('GameBridge: could not save score', e);
      return 0;
    }
  }

  // ── Public API ───────────────────────────────────────────────
  window.GameBridge = {

    submitScore: function(opts) {
      var gameId    = opts.gameId    || 'unknown';
      var score     = opts.score     || 0;
      var accuracy  = opts.accuracy  != null ? opts.accuracy  : 100;
      var questions = opts.questions != null ? opts.questions : 1;

      var xpEarned = _saveScore(gameId, score, accuracy, questions);

      // Also notify parent frame if embedded in iframe
      try {
        window.parent.postMessage({
          type:     'gameComplete',
          gameId:   gameId,
          score:    score,
          accuracy: accuracy,
          xp:       xpEarned,
        }, '*');
      } catch(e) {}

      // Update overlay UI
      document.getElementById('gb-score-val').textContent = score.toLocaleString();
      document.getElementById('gb-acc-val').textContent   = accuracy < 100 ? accuracy + '%' : '✓';
      document.getElementById('gb-xp-val').textContent    = '+' + xpEarned;

      // Pick emoji based on performance
      var emoji = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🎉' : accuracy >= 50 ? '👍' : '💪';
      document.getElementById('gb-emoji').textContent = emoji;

      // Show overlay
      var overlay = document.getElementById('gb-overlay');
      overlay.classList.add('show');
    },

    toggleMute: function() {
      _muted = !_muted;
      _applyMute(_muted);
      var btn = document.getElementById('gb-mute');
      btn.textContent = _muted ? '🔇 Muted' : '🔊 Sound';
      try {
        var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        data.sound = !_muted;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } catch(e) {}
    },

    goHub: function() {
      window.location.href = HUB_URL;
    },

    replay: function() {
      document.getElementById('gb-overlay').classList.remove('show');
      window.location.reload();
    },

    isMuted: function() { return _muted; },
  };

})();
</script>

  // ========== GLOBAL STATE ==========
  let unlocked = { easy: true, medium: false, hard: false };
  let currentLevel = "easy";
  let score = 0;
  let currentIndex = 0;
  let questions = [];
  let locked = false;
  let soundEnabled = true;

  // ========== SOUND HANDLING ==========

  // ========== SHUFFLE FUNCTION ==========
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;

    if (currentIndex >= questions.length) {
      endLevel();
      return;
    }
    const q = questions[currentIndex];
    const shuffledClasses = shuffleArray([...animalClasses]);
    root.innerHTML = `
      <div class="screen">
        <div class="score-bar">
          <span>🌿 Score</span>
          <span class="score-num">${score}</span>
        </div>
        <div class="progress">Question ${currentIndex+1} / ${questions.length}</div>
        <div class="animal-display">
          <div class="animal-emoji">${q.e}</div>
          <div class="animal-name">${q.n}</div>
          <div class="animal-fact">${q.f}</div>
        </div>
        <p style="text-align:center; font-size:0.95rem; color:#555; margin-bottom:4px">What class of animal is this?</p>
        <div class="opts">
          ${shuffledClasses.map(cls => `<button class="opt" data-class="${cls}">${cls}</button>`).join('')}
        </div>
      </div>
    `;
    locked = false;
    document.querySelectorAll('.opt').forEach(btn => {
      btn.onclick = () => handleAnswer(btn, q.c);
    });
  }

  function handleAnswer(btn, correctClass) {
    if (locked) return;
    locked = true;
    const selected = btn.getAttribute('data-class');
    if (selected === correctClass) {
      score += 10;
      btn.classList.add('right');
      playCorrectSound();
      currentIndex++;
      setTimeout(() => showQuestion(), 500);
    } else {
      score = Math.max(0, score - 5);
      btn.classList.add('wrong');
      playWrongSound();
      setTimeout(() => {
        btn.classList.remove('wrong');
        locked = false;
      }, 700);
    }
  }

  function endLevel() {
    const maxScore = questions.length * 10;
    const percent = Math.round((score / maxScore) * 100);
    let message = '';
    if (percent >= 90) message = '🌟 Excellent! You really know your animals! 🌟';
    else if (percent >= 70) message = '👍 Good job! You\'re a natural! 👍';
    else message = '📚 Keep studying! Try again to unlock the next level. 📚';
    
    // Unlock next level if score >= 70%
    if (percent >= 70) {
      if (currentLevel === 'easy') unlocked.medium = true;
      if (currentLevel === 'medium') unlocked.hard = true;
    }
    
    const showNext = (percent >= 70 && currentLevel !== 'hard');
    root.innerHTML = `
      <div class="screen" style="text-align:center">
        <h1>${percent >= 80 ? '🎉' : '😊'} Level Complete!</h1>
        <p style="font-size:2rem; margin:20px 0">${score} / ${maxScore}</p>
        <p style="color:#888; margin-bottom:20px">${percent}% — ${message}</p>
        ${showNext ? '<button class="btn" id="nextLevelBtn">Next Level →</button>' : ''}
        <button class="btn" id="backToLevelsBtn" style="margin-left: 10px;">← Back to Levels</button>
      </div>
    `;
    
    if (showNext) {
      document.getElementById('nextLevelBtn').onclick = () => {
        const next = currentLevel === 'easy' ? 'medium' : 'hard';
        startLevel(next);
      };
    }
    document.getElementById('backToLevelsBtn').onclick = () => showLevelSelect();
    
    playCompleteSound();
    // Report to parent hub
    if (typeof window.parent !== 'undefined') {
      window.parent.postMessage({ type: 'gameComplete', gameId: 'animal', score: percent, total: 100 }, '*');
    }
  }

  // Expose functions globally for buttons
  window.showStart = showStart;
  window.showLevelSelect = showLevelSelect;
  window.startLevel = startLevel;

  // Initialize
  showStart();
</script>
</body>
</html>
