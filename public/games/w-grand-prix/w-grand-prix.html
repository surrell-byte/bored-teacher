<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Grand Prix</title>
<style>
  *, *::before, *::after { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #8b93a8;
    --text3: #555f74;
    --amber: #f59e0b;
    --amber-dark: #b45309;
    --blue: #3b82f6;
    --blue-dark: #1d4ed8;
    --green: #22c55e;
    --red: #ef4444;
    --teal: #14b8a6;
    --purple: #a78bfa;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--amber);
    margin-bottom: 4px;
  }

  .page-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 28px;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; max-width: 720px; }
  .screen.active { display: block; }

  /* ── SETUP ── */
  .setup-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px;
  }

  .setup-card h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
  }

  .avatar-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .av-btn {
    font-size: 22px;
    padding: 10px 16px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    line-height: 1;
  }

  .av-btn:hover { background: #2a3249; transform: scale(1.08); }
  .av-btn.picked { opacity: 0.25; pointer-events: none; filter: grayscale(1); }

  .sel-bar {
    font-size: 14px;
    color: var(--text2);
    padding: 10px 14px;
    background: var(--bg3);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    margin-bottom: 20px;
    min-height: 42px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .sel-emoji { font-size: 20px; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    cursor: pointer;
    background: var(--bg3);
    color: var(--text);
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
  }

  button:hover { background: #2a3249; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; pointer-events: none; }

  button.primary {
    background: var(--amber);
    color: #1a0e00;
    border-color: var(--amber-dark);
    font-weight: 700;
  }

  button.primary:hover { background: #fbbf24; }

  button.danger {
    background: transparent;
    border-color: rgba(239,68,68,0.4);
    color: var(--red);
  }

  /* ── GAME LAYOUT ── */
  .game-layout {
    display: grid;
    grid-template-columns: 1fr 230px;
    gap: 14px;
    align-items: start;
  }

  /* ── TRACK ── */
  .track-wrap {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  #track-svg {
    width: 100%;
    display: block;
  }

  /* ── TIMER BAR ── */
  .timer-wrap {
    margin-top: 10px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  #timer-bar {
    height: 100%;
    width: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: background 0.3s;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 10px; }

  .panel {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 14px;
  }

  .panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* ── LEADERBOARD ── */
  .lb-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }

  .lb-row:last-child { border-bottom: none; }
  .lb-pos { font-size: 11px; color: var(--text3); width: 14px; flex-shrink: 0; }
  .lb-emoji { font-size: 18px; flex-shrink: 0; }
  .lb-prog { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .lb-prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .lb-tile { font-size: 11px; color: var(--text3); width: 30px; text-align: right; flex-shrink: 0; }

  /* ── CARDS ── */
  .cards-row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .card {
    width: 60px;
    height: 84px;
    perspective: 500px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 0.5px solid var(--border2);
  }

  .card-front {
    background: var(--bg3);
    font-size: 24px;
    color: var(--text3);
    transition: background 0.15s;
  }

  .card:hover:not(.disabled) .card-front { background: #2a3249; }

  .card-back {
    background: var(--bg2);
    transform: rotateY(180deg);
    padding: 8px 4px;
    gap: 4px;
  }

  .card-delta {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .card-desc {
    font-size: 9px;
    color: var(--text2);
    text-align: center;
    line-height: 1.3;
  }

  .card.disabled { pointer-events: none; opacity: 0.3; }

  /* ── STATUS ── */
  .status-box {
    background: var(--bg3);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    min-height: 46px;
    border: 0.5px solid var(--border);
    transition: border-color 0.2s;
  }

  .status-box.highlight { border-color: var(--blue); }

  /* ── LOG ── */
  .log-list {
    max-height: 130px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .log-entry {
    font-size: 11px;
    color: var(--text2);
    padding: 3px 0;
    border-bottom: 0.5px solid var(--border);
    line-height: 1.4;
  }

  .log-entry:last-child { border-bottom: none; }
  .log-entry.special { color: var(--amber); }
  .log-entry.finish { color: var(--green); font-weight: 600; }

  /* ── PODIUM ── */
  .podium-wrap {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 40px 28px;
    text-align: center;
  }

  .podium-wrap h2 { font-size: 22px; color: var(--amber); margin-bottom: 4px; }
  .podium-wrap p { font-size: 14px; color: var(--text2); margin-bottom: 32px; }

  .podium-stage {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .podium-place {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .p-emoji { font-size: 32px; line-height: 1; }

  .p-block {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius) var(--radius) 0 0;
    font-size: 15px;
    font-weight: 700;
  }

  .p1 { width: 80px; height: 80px; background: var(--amber); color: #1a0e00; }
  .p2 { width: 70px; height: 60px; background: #6b7280; color: #f9fafb; }
  .p3 { width: 60px; height: 44px; background: #92400e; color: #fde68a; }

  .podium-rest {
    margin-bottom: 28px;
  }

  .rest-row {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 16px;
    font-size: 14px;
    color: var(--text2);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .game-layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
    .cards-row { justify-content: center; }
  }
</style>
</head>
<body>

<h1>&#127937; W Grand Prix</h1>
<p class="page-sub">Pick your racers, then pick your cards</p>

<!-- SETUP -->
<div id="setup-screen" class="screen active">
  <div class="setup-card">
    <h2>Choose your racers (2–6)</h2>
    <div class="avatar-grid" id="av-grid"></div>
    <div class="sel-bar" id="sel-bar"><span style="color:var(--text3)">No racers selected yet</span></div>

    <div style="margin-bottom:18px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:8px">Turn timer</label>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="range" id="timer-setting" min="5" max="20" step="1" value="8" style="flex:1;accent-color:var(--amber)">
        <span id="timer-val" style="font-size:14px;font-weight:600;color:var(--amber);min-width:40px">8s</span>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:8px">Track length</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="track-short" class="primary" onclick="setTrack(16,'short')">Short (16)</button>
        <button id="track-med" onclick="setTrack(20,'med')">Standard (20)</button>
        <button id="track-long" onclick="setTrack(28,'long')">Long (28)</button>
      </div>
    </div>

    <div class="btn-row">
      <button onclick="resetSelection()">Reset</button>
      <button id="start-btn" class="primary" disabled onclick="startGame()">Start race &#128640;</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-layout" id="game-layout">
    <div class="track-wrap">
      <svg id="track-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="timer-wrap"><div id="timer-bar"></div></div>
    </div>

    <div class="sidebar">
      <!-- Leaderboard -->
      <div class="panel">
        <div class="panel-title">Standings</div>
        <div id="lb-rows"></div>
      </div>

      <!-- Cards -->
      <div class="panel">
        <div class="panel-title" id="ca-label">Your move</div>
        <div class="cards-row" id="cards-row"></div>
      </div>

      <!-- Status -->
      <div class="status-box" id="status-box">Loading…</div>

      <!-- Log -->
      <div class="panel">
        <div class="panel-title">Race log</div>
        <div class="log-list" id="log-list"></div>
      </div>

      <button onclick="goMenu()" class="danger">&#8962; Menu</button>
    </div>
  </div>
</div>

<!-- PODIUM -->
<div id="podium-screen" class="screen">
  <div class="podium-wrap">
    <h2>Race complete!</h2>
    <p id="podium-sub">Final standings</p>
    <div class="podium-stage" id="podium-stage"></div>
    <div class="podium-rest" id="podium-rest"></div>
    <div class="btn-row" style="justify-content:center">
      <button class="primary" onclick="replayGame()">&#9654; Race again</button>
      <button onclick="goMenu()">&#8962; Main menu</button>
    </div>
  </div>
</div>

<script>
  /* ── CONFIG ── */
  const EMOJIS = ["🏎","🚗","🚕","🚙","🚓","🚑","🏍","🚒"];
  const PLAYER_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#14b8a6","#f97316","#ec4899"];

  /* ── MOVE DECK ── */
  const BASE_MOVES = [
    {delta:-1, label:"-1", desc:"Tire slip"},
    {delta:0,  label:"0",  desc:"Pit stop"},
    {delta:1,  label:"+1", desc:"Overtake"},
    {delta:2,  label:"+2", desc:"DRS boost"},
    {delta:3,  label:"+3", desc:"Full throttle"},
  ];

  /* ── SPECIALS by tile index (configurable with track) ── */
  function buildSpecials(total) {
    const s = {};
    const marks = [
      Math.floor(total * 0.15), Math.floor(total * 0.25),
      Math.floor(total * 0.40), Math.floor(total * 0.55),
      Math.floor(total * 0.70), Math.floor(total * 0.85),
    ];
    const effects = [
      {delta:-1, desc:"Oil slick! -1"},
      {delta: 2, desc:"Slipstream! +2"},
      {delta:-2, desc:"Crash! -2"},
      {delta: 1, desc:"Safety car ends +1"},
      {delta: 2, desc:"DRS zone! +2"},
      {delta:-1, desc:"Debris! -1"},
    ];
    marks.forEach((m, i) => { s[m] = effects[i % effects.length]; });
    return s;
  }

  /* ── STATE ── */
  let selected = [];
  let players = [];
  let currentIdx = 0;
  let gameState = "idle"; // idle | waiting | moving | done
  let timerInterval = null, moveTimeout = null;
  let finishOrder = [];
  let currentCards = [];
  let trackTotal = 16;
  let specials = {};
  let turnSecs = 8;
  let tilePositions = [];
  let lastSelected = [];

  /* ── DOM ── */
  const avGrid = document.getElementById("av-grid");
  const selBar = document.getElementById("sel-bar");
  const startBtn = document.getElementById("start-btn");
  const trackSvg = document.getElementById("track-svg");
  const lbRows = document.getElementById("lb-rows");
  const cardsRow = document.getElementById("cards-row");
  const caLabel = document.getElementById("ca-label");
  const statusBox = document.getElementById("status-box");
  const logList = document.getElementById("log-list");
  const timerBar = document.getElementById("timer-bar");

  /* ── SETUP ── */
  EMOJIS.forEach(e => {
    const b = document.createElement("button");
    b.className = "av-btn";
    b.textContent = e;
    b.onclick = () => {
      if (b.classList.contains("picked")) return;
      if (selected.length >= 6) { b.style.animation = "none"; return; }
      selected.push(e);
      b.classList.add("picked");
      updateSelBar();
    };
    avGrid.appendChild(b);
  });

  document.getElementById("timer-setting").oninput = function() {
    turnSecs = parseInt(this.value);
    document.getElementById("timer-val").textContent = turnSecs + "s";
  };

  function setTrack(n, id) {
    trackTotal = n;
    ["short","med","long"].forEach(k => {
      const el = document.getElementById("track-" + k);
      el.className = k === id ? "primary" : "";
    });
  }

  function updateSelBar() {
    if (selected.length === 0) {
      selBar.innerHTML = '<span style="color:var(--text3)">No racers selected yet</span>';
    } else {
      selBar.innerHTML = selected.map((e,i) =>
        `<span class="sel-emoji" style="filter:drop-shadow(0 0 4px ${PLAYER_COLORS[i]})">${e}</span>`
      ).join("");
    }
    startBtn.disabled = selected.length < 2;
  }

  function resetSelection() {
    selected = [];
    document.querySelectorAll(".av-btn").forEach(b => b.classList.remove("picked"));
    updateSelBar();
  }

  /* ── TRACK GEOMETRY ── */
  function computeTilePositions(total) {
    const cols = 5;
    const tw = 46, th = 46, gx = 10, gy = 10;
    const ox = 14, oy = 12;
    const rows = Math.ceil(total / cols);
    const positions = new Array(total);
    let order = 0;
    for (let r = 0; r < rows; r++) {
      const rowStart = r * cols;
      const rowEnd = Math.min(rowStart + cols, total);
      const indices = [];
      for (let c = rowStart; c < rowEnd; c++) indices.push(c);
      if (r % 2 === 1) indices.reverse();
      indices.forEach(idx => {
        const col = order % cols;
        const row = Math.floor(order / cols);
        const cx = ox + col * (tw + gx);
        const cy = oy + row * (th + gy);
        positions[idx] = { x: cx, y: cy, cx: cx + tw/2, cy: cy + th/2 };
        order++;
      });
    }
    const svgH = oy * 2 + rows * (th + gy) - gy;
    const svgW = ox * 2 + cols * (tw + gx) - gx;
    return { positions, svgW, svgH };
  }

  /* ── BUILD TRACK ── */
  function buildTrack() {
    specials = buildSpecials(trackTotal);
    const { positions, svgW, svgH } = computeTilePositions(trackTotal);
    tilePositions = positions;
    trackSvg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);
    trackSvg.innerHTML = "";

    // Connector lines (drawn first, behind tiles)
    for (let i = 1; i < trackTotal; i++) {
      const a = positions[i-1], b = positions[i];
      const line = svgEl("line", {
        x1: a.cx, y1: a.cy, x2: b.cx, y2: b.cy,
        stroke: "rgba(255,255,255,0.06)", "stroke-width": 1.5,
        "stroke-dasharray": "3,4"
      });
      trackSvg.appendChild(line);
    }

    // Tiles
    for (let i = 0; i < trackTotal; i++) {
      const { x, y } = positions[i];
      const tw = 46, th = 46;
      const isFinish = i === trackTotal - 1;
      const sp = specials[i];

      const fill = isFinish ? "#f59e0b" : sp ? (sp.delta > 0 ? "#0d2b1a" : "#2b0d0d") : "#1e2535";
      const stroke = isFinish ? "#b45309" : sp ? (sp.delta > 0 ? "#22c55e" : "#ef4444") : "rgba(255,255,255,0.1)";

      const rect = svgEl("rect", {
        x, y, width: tw, height: th, rx: 7,
        fill, stroke, "stroke-width": 0.75
      });
      trackSvg.appendChild(rect);

      // Tile number
      const numTxt = svgEl("text", {
        x: x + tw/2, y: y + 15,
        "text-anchor": "middle",
        "font-size": 9, fill: isFinish ? "#92400e" : "rgba(255,255,255,0.25)",
        "font-family": "inherit"
      });
      numTxt.textContent = i + 1;
      trackSvg.appendChild(numTxt);

      if (isFinish) {
        const t = svgEl("text", { x: x + tw/2, y: y + 30, "text-anchor": "middle", "font-size": 10, fill: "#92400e", "font-weight": "bold", "font-family": "inherit" });
        t.textContent = "FINISH";
        trackSvg.appendChild(t);
      } else if (sp) {
        const t = svgEl("text", { x: x + tw/2, y: y + 31, "text-anchor": "middle", "font-size": 16, fill: sp.delta > 0 ? "#22c55e" : "#ef4444" });
        t.textContent = sp.delta > 0 ? "↑" : "↓";
        trackSvg.appendChild(t);
      }
    }

    renderPieces();
  }

  function svgEl(tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  /* ── PIECES ── */
  function renderPieces() {
    trackSvg.querySelectorAll(".piece").forEach(e => e.remove());
    const occupied = {};
    players.forEach((p, pi) => {
      if (p.finished) return;
      const key = p.pos;
      occupied[key] = (occupied[key] || 0);
      const pos = tilePositions[p.pos];
      if (!pos) return;
      const off = occupied[key] * 13;
      occupied[key]++;
      const isActive = p.id === currentIdx && gameState === "waiting";
      const color = PLAYER_COLORS[pi];

      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", "piece");

      const circle = svgEl("circle", {
        cx: pos.cx - 10 + off, cy: pos.cy + 10, r: 9,
        fill: isActive ? color : "rgba(255,255,255,0.08)",
        stroke: color, "stroke-width": isActive ? 2 : 1
      });
      g.appendChild(circle);

      const et = svgEl("text", {
        x: pos.cx - 10 + off, y: pos.cy + 14,
        "text-anchor": "middle", "font-size": 10
      });
      et.textContent = p.emoji;
      g.appendChild(et);

      trackSvg.appendChild(g);
    });
  }

  /* ── LEADERBOARD ── */
  function renderLeaderboard() {
    const sorted = [...players].sort((a, b) => {
      if (a.finished && !b.finished) return -1;
      if (!a.finished && b.finished) return 1;
      return b.pos - a.pos;
    });
    lbRows.innerHTML = "";
    sorted.forEach((p, i) => {
      const pct = Math.round((p.pos / (trackTotal - 1)) * 100);
      const color = PLAYER_COLORS[p.id];
      const row = document.createElement("div");
      row.className = "lb-row";
      row.innerHTML = `
        <span class="lb-pos">${i + 1}</span>
        <span class="lb-emoji">${p.emoji}</span>
        <div class="lb-prog"><div class="lb-prog-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="lb-tile">${p.pos}/${trackTotal - 1}</span>
      `;
      lbRows.appendChild(row);
    });
  }

  /* ── CARD GENERATION with rubber-banding ── */
  function generateCards() {
    const p = players[currentIdx];
    const maxPos = Math.max(...players.map(x => x.pos));
    const behind = maxPos - p.pos;
    let pool = [...BASE_MOVES];
    if (behind > 4) {
      pool.push({ delta: 2, label: "+2", desc: "Catch-up turbo" });
      pool.push({ delta: 3, label: "+3", desc: "Comeback heat" });
      pool.push({ delta: 3, label: "+3", desc: "Slipstream boost" });
    }
    if (p.pos === maxPos && maxPos > trackTotal * 0.5) {
      pool.push({ delta: 0, label: "0", desc: "Leader pressure" });
      pool.push({ delta: -1, label: "-1", desc: "Tire wear" });
    }
    const result = [];
    const used = new Set();
    let tries = 0;
    while (result.length < 3 && tries < 30) {
      const idx = Math.floor(Math.random() * pool.length);
      if (!used.has(pool[idx].desc) || tries > 15) {
        used.add(pool[idx].desc);
        result.push({ ...pool[idx] });
      }
      tries++;
    }
    return result;
  }

  /* ── CARD UI ── */
  function buildCardUI(cards) {
    cardsRow.innerHTML = "";
    currentCards = cards;
    cards.forEach((c, i) => {
      const div = document.createElement("div");
      div.className = "card";

      const inner = document.createElement("div");
      inner.className = "card-inner";

      const front = document.createElement("div");
      front.className = "card-face card-front";
      front.textContent = "?";

      const back = document.createElement("div");
      back.className = "card-face card-back";

      const color = c.delta >= 3 ? "#22c55e" : c.delta === 2 ? "#3b82f6" : c.delta <= 0 ? "#ef4444" : "#f59e0b";
      back.innerHTML = `<span class="card-delta" style="color:${color}">${c.label}</span><span class="card-desc">${c.desc}</span>`;

      inner.appendChild(front);
      inner.appendChild(back);
      div.appendChild(inner);
      div.onclick = () => pickCard(i);
      cardsRow.appendChild(div);
    });
  }

  function flipCard(i) {
    const cards = cardsRow.querySelectorAll(".card");
    if (cards[i]) cards[i].classList.add("flipped");
  }

  function disableCards() {
    cardsRow.querySelectorAll(".card").forEach(c => c.classList.add("disabled"));
  }

  /* ── TIMER ── */
  let timerStart = 0;

  function startTurnTimer(secs, cb) {
    clearTimers();
    timerStart = Date.now();
    const dur = secs * 1000;
    timerBar.style.background = "var(--blue)";
    timerBar.style.width = "100%";
    timerInterval = setInterval(() => {
      const pct = Math.max(0, 100 - ((Date.now() - timerStart) / dur) * 100);
      timerBar.style.width = pct + "%";
      if (pct < 25) timerBar.style.background = "#ef4444";
      else if (pct < 50) timerBar.style.background = "#f59e0b";
      else timerBar.style.background = "var(--blue)";
      if (pct <= 0) { clearInterval(timerInterval); cb(); }
    }, 40);
  }

  function clearTimers() {
    clearInterval(timerInterval);
    clearTimeout(moveTimeout);
    timerInterval = null;
    moveTimeout = null;
    timerBar.style.width = "0%";
  }

  /* ── GAME START ── */
  function startGame() {
    if (selected.length < 2) return;
    clearTimers();
    finishOrder = [];
    lastSelected = [...selected];
    players = selected.map((e, i) => ({ id: i, emoji: e, pos: 0, finished: false }));
    currentIdx = 0;
    gameState = "idle";
    buildTrack();
    renderLeaderboard();
    logList.innerHTML = "";
    showScreen("game-screen");
    startTurn();
  }

  /* ── TURN ── */
  function startTurn() {
    const active = players.filter(p => !p.finished);
    if (active.length === 0) { showPodium(); return; }
    const p = players[currentIdx];
    if (p.finished) { advanceTurn(); return; }
    gameState = "waiting";
    const cards = generateCards();
    buildCardUI(cards);
    caLabel.textContent = `${p.emoji} — pick a card`;
    statusBox.className = "status-box highlight";
    statusBox.textContent = `${p.emoji}'s turn — ${turnSecs}s to pick`;
    renderPieces();
    startTurnTimer(turnSecs, () => {
      const ri = Math.floor(Math.random() * 3);
      addLog(`${p.emoji} ran out of time — auto-pick`, "");
      pickCard(ri, true);
    });
  }

  function pickCard(i, auto) {
    if (gameState !== "waiting") return;
    clearTimers();
    gameState = "moving";
    disableCards();
    flipCard(i);
    const p = players[currentIdx];
    const move = currentCards[i];
    const autoTag = auto ? " (auto)" : "";
    addLog(`${p.emoji} ${move.label} — ${move.desc}${autoTag}`);
    statusBox.className = "status-box";
    statusBox.textContent = `${p.emoji} picked ${move.label}: ${move.desc}`;
    moveTimeout = setTimeout(() => applyMove(p, move.delta, true), 550);
  }

  function applyMove(p, delta, checkSpecial) {
    const prev = p.pos;
    p.pos = Math.max(0, Math.min(trackTotal - 1, p.pos + delta));
    renderPieces();
    renderLeaderboard();
    if (p.pos === trackTotal - 1) { finishPlayer(p); return; }
    if (checkSpecial && specials[p.pos] && p.pos !== prev) {
      const sp = specials[p.pos];
      statusBox.textContent = `${p.emoji} hit tile ${p.pos + 1}: ${sp.desc}`;
      addLog(`${p.emoji} special — ${sp.desc}`, "special");
      moveTimeout = setTimeout(() => applyMove(p, sp.delta, false), 700);
      return;
    }
    advanceTurn();
  }

  function finishPlayer(p) {
    p.finished = true;
    p.pos = trackTotal - 1;
    finishOrder.push(p);
    addLog(`${p.emoji} finished! Position #${finishOrder.length}`, "finish");
    statusBox.textContent = `${p.emoji} crossed the line! #${finishOrder.length}`;
    renderPieces();
    renderLeaderboard();
    const remaining = players.filter(x => !x.finished);
    if (remaining.length === 0) { moveTimeout = setTimeout(showPodium, 900); return; }
    moveTimeout = setTimeout(advanceTurn, 800);
  }

  function advanceTurn() {
    let next = (currentIdx + 1) % players.length;
    let attempts = 0;
    while (players[next].finished && attempts < players.length) {
      next = (next + 1) % players.length;
      attempts++;
    }
    currentIdx = next;
    startTurn();
  }

  /* ── LOG ── */
  function addLog(msg, type) {
    const e = document.createElement("div");
    e.className = "log-entry" + (type ? " " + type : "");
    e.textContent = msg;
    logList.insertBefore(e, logList.firstChild);
    while (logList.children.length > 40) logList.removeChild(logList.lastChild);
  }

  /* ── PODIUM ── */
  function showPodium() {
    clearTimers();
    gameState = "done";
    const remaining = players.filter(p => !p.finished).sort((a, b) => b.pos - a.pos);
    const full = [...finishOrder, ...remaining];
    document.getElementById("podium-sub").textContent = `${players.length} racers · ${trackTotal} tiles`;

    const stage = document.getElementById("podium-stage");
    stage.innerHTML = "";
    const order = [1, 0, 2];
    const labels = ["1st", "2nd", "3rd"];
    const cls = ["p2", "p1", "p3"];
    order.forEach(rank => {
      const p = full[rank];
      if (!p) return;
      const div = document.createElement("div");
      div.className = "podium-place";
      div.innerHTML = `
        <span class="p-emoji">${p.emoji}</span>
        <div class="p-block ${cls[rank]}">${labels[rank]}</div>
      `;
      stage.appendChild(div);
    });

    const rest = document.getElementById("podium-rest");
    rest.innerHTML = "";
    full.slice(3).forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "rest-row";
      div.textContent = `${i + 4}th — ${p.emoji}`;
      rest.appendChild(div);
    });

    showScreen("podium-screen");
  }

  /* ── NAVIGATION ── */
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function goMenu() {
    clearTimers();
    gameState = "idle";
    showScreen("setup-screen");
  }

  function replayGame() {
    selected = [...lastSelected];
    document.querySelectorAll(".av-btn").forEach(b => {
      b.classList.toggle("picked", selected.includes(b.textContent));
    });
    updateSelBar();
    startGame();
  }

  /* ── INIT ── */
  setTrack(16, "short");
  updateSelBar();
</script>
</body>
</html>
