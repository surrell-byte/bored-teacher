<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Mo! — Modern Platformer</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #1f3b73, #0a1428 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', 'Courier New', monospace;
      padding: 16px;
    }

    /* Glassmorphism game card */
    .game-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 180, 80, 0.15);
      cursor: pointer;
      width: 100%;
      height: auto;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    /* Modern HUD */
    .stats {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 20;
      letter-spacing: 0.5px;
    }

    .stats span {
      color: #ffd166;
      font-size: 22px;
      font-weight: 700;
      margin-left: 6px;
    }

    /* Controls tooltip */
    .controls-tip {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      color: #ddd;
      border: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
      pointer-events: none;
      z-index: 20;
    }

    .controls-tip kbd {
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 8px;
      border-radius: 30px;
      color: #ffd966;
      font-weight: bold;
      margin: 0 4px;
      display: inline-block;
      font-family: monospace;
      font-size: 11px;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    @media (max-width: 860px) {
      .stats { font-size: 14px; top: 12px; left: 12px; padding: 4px 14px; }
      .stats span { font-size: 18px; }
      .controls-tip { font-size: 10px; bottom: 8px; white-space: nowrap; }
      .controls-tip kbd { padding: 1px 5px; font-size: 9px; }
    }
  </style>

<script>
(function() {
  'use strict';

  var HUB_URL = '/hub';
  var LS_KEY  = 'eslhub_data';
  var _muted  = false;

  // ── Detect audio elements and show mute button ───────────────
  window.addEventListener('DOMContentLoaded', function() {
    var audioEls = document.querySelectorAll('audio, video');
    if (audioEls.length > 0) {
      document.getElementById('gb-mute').style.display = 'flex';
    }
    // Respect hub's sound setting
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (data.sound === false) {
        _muted = true;
        _applyMute(true);
        document.getElementById('gb-mute').textContent = '🔇 Muted';
      }
    } catch(e) {}
  });

  function _applyMute(muted) {
    var audioEls = document.querySelectorAll('audio, video');
    audioEls.forEach(function(el) { el.muted = muted; });
    // Also set global flag many games check
    if (typeof window.soundEnabled !== 'undefined') window.soundEnabled = !muted;
    if (typeof window.audioEnabled !== 'undefined') window.audioEnabled = !muted;
    if (typeof window.muteSound   !== 'undefined') window.muteSound    = muted;
  }

  // ── XP calculation ───────────────────────────────────────────
  function _calcXP(score, accuracy) {
    var base = Math.min(Math.floor(score / 10), 30);
    var accBonus = accuracy >= 90 ? 20 : accuracy >= 70 ? 10 : accuracy >= 50 ? 5 : 0;
    return Math.max(base + accBonus, 5); // minimum 5 XP for completing
  }

  // ── Save score to localStorage (eslhub_data) ─────────────────
  function _saveScore(gameId, score, accuracy, questions) {
    try {
      var raw  = localStorage.getItem(LS_KEY);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.games) data.games = {};
      var prev = data.games[gameId] || { highScore: 0, completions: 0, lastAccuracy: 0, totalQuestions: 100 };

      data.games[gameId] = {
        highScore:      Math.max(prev.highScore || 0, score),
        completions:    (prev.completions || 0) + 1,
        lastAccuracy:   accuracy,
        totalQuestions: questions || 100,
      };

      // Add XP + coins
      var xpEarned = _calcXP(score, accuracy);
      data.xp     = (data.xp     || 0) + xpEarned;
      data.coins  = (data.coins  || 0) + Math.floor(xpEarned / 2);
      data.lastGame = gameId;

      // Level up check
      var level = data.level || 1;
      var xp    = data.xp;
      function xpForLevel(l) { return 100 + (l - 1) * 50; }
      while (xp >= xpForLevel(level)) { xp -= xpForLevel(level); level++; }
      data.level = level;
      data.xp    = xp;

      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return xpEarned;
    } catch(e) {
      console.warn('GameBridge: could not save score', e);
      return 0;
    }
  }

  // ── Public API ───────────────────────────────────────────────
  window.GameBridge = {

    submitScore: function(opts) {
      var gameId    = opts.gameId    || 'unknown';
      var score     = opts.score     || 0;
      var accuracy  = opts.accuracy  != null ? opts.accuracy  : 100;
      var questions = opts.questions != null ? opts.questions : 1;

      var xpEarned = _saveScore(gameId, score, accuracy, questions);

      // Also notify parent frame if embedded in iframe
      try {
        window.parent.postMessage({
          type:     'gameComplete',
          gameId:   gameId,
          score:    score,
          accuracy: accuracy,
          xp:       xpEarned,
        }, '*');
      } catch(e) {}

      // Update overlay UI
      document.getElementById('gb-score-val').textContent = score.toLocaleString();
      document.getElementById('gb-acc-val').textContent   = accuracy < 100 ? accuracy + '%' : '✓';
      document.getElementById('gb-xp-val').textContent    = '+' + xpEarned;

      // Pick emoji based on performance
      var emoji = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🎉' : accuracy >= 50 ? '👍' : '💪';
      document.getElementById('gb-emoji').textContent = emoji;

      // Show overlay
      var overlay = document.getElementById('gb-overlay');
      overlay.classList.add('show');
    },

    toggleMute: function() {
      _muted = !_muted;
      _applyMute(_muted);
      var btn = document.getElementById('gb-mute');
      btn.textContent = _muted ? '🔇 Muted' : '🔊 Sound';
      try {
        var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        data.sound = !_muted;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } catch(e) {}
    },

    goHub: function() {
      window.location.href = HUB_URL;
    },

    replay: function() {
      document.getElementById('gb-overlay').classList.remove('show');
      window.location.reload();
    },

    isMuted: function() { return _muted; },
  };

})();
</script>

<body>
<div style="position: relative; display: inline-block;">
  <div class="stats">💎 GEMS: <span id="scoreValue">0</span></div>
  <div class="game-card">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
  </div>
  <div class="controls-tip">
    🎮 <kbd>◀</kbd> <kbd>▶</kbd> move &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>␣</kbd> / <kbd>▲</kbd> jump (hold for higher) &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>X</kbd> slash &nbsp;&nbsp;|&nbsp;&nbsp; <kbd>R</kbd> restart
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ----- GAME STATE -----
    let gameState = "playing"; // playing | dead | win
    let score = 0;
    const scoreSpan = document.getElementById('scoreValue');

    // ----- CAMERA (smooth follow) -----
    let cameraX = 0;
    let targetCameraX = 0;

    // ----- PHYSICS (fixed for reachability) -----
    const GRAVITY = 0.6;
    const JUMP_POWER = -15;     // ~187px max height (safe for all platforms)
    const ACCEL = 0.5;
    const FRICTION = 0.8;
    const MAX_SPEED = 5;

    // ----- GAME FEEL -----
    let coyoteTime = 0;
    let jumpBuffer = 0;

    // ----- SCREEN SHAKE & IMPACT -----
    let shake = 0;

    // ----- INPUT -----
    const keys = {};

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'ArrowUp') jumpBuffer = 10;
      if (e.code === 'KeyR') resetGame();
      // prevent arrow keys from scrolling
      if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyX') {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', e => {
      keys[e.code] = false;
      // VARIABLE JUMP: short hop if release early
      if ((e.code === 'Space' || e.code === 'ArrowUp') && player && player.vy < -6) {
        player.vy *= 0.5;  // reduces upward velocity → smaller jump
      }
    });

    // ----- PLAYER CLASS (with HP, invincibility, shadow) -----
    class Player {
      constructor() {
        this.x = 100;
        this.y = 200;
        this.w = 32;
        this.h = 32;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.facing = 1;
        this.attackTimer = 0;
        this.hp = 3;
        this.invincible = 0;
      }

      takeDamage() {
        if (this.invincible > 0) return;
        this.hp--;
        this.invincible = 60; // 1 second immunity
        shake = 12;
        if (this.hp <= 0) {
          gameState = "dead";
        }
      }

      update() {
        if (gameState !== "playing") return;

        if (this.invincible > 0) this.invincible--;

        // acceleration
        if (keys.ArrowLeft) this.vx -= ACCEL;
        if (keys.ArrowRight) this.vx += ACCEL;
        this.vx *= FRICTION;
        this.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, this.vx));

        // coyote time
        if (this.onGround) coyoteTime = 6;
        else coyoteTime--;

        // jump buffer
        if (jumpBuffer > 0) jumpBuffer--;
        if (jumpBuffer > 0 && coyoteTime > 0) {
          this.vy = JUMP_POWER;
          jumpBuffer = 0;
          coyoteTime = 0;
        }

        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        if (this.vx !== 0) this.facing = Math.sign(this.vx);

        if (this.attackTimer > 0) this.attackTimer--;
        if (keys.KeyX && this.attackTimer === 0 && gameState === "playing") {
          this.attackTimer = 10;
          shake = 6;
        }
      }

      draw() {
        // shadow under player
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.beginPath();
        ctx.ellipse(
          this.x - cameraX + this.w / 2,
          this.y + this.h - 4,
          this.w * 0.7,
          6,
          0, 0, Math.PI * 2
        );
        ctx.fill();

        // invincibility flash effect
        let isInvincibleFlash = (this.invincible > 0 && (Math.floor(Date.now() / 50) % 2 === 0));
        ctx.fillStyle = isInvincibleFlash ? "#ffffff" : "#ff77b5";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);

        // sword attack
        if (this.attackTimer > 0) {
          ctx.fillStyle = "#ffcc44";
          ctx.shadowBlur = 6;
          ctx.shadowColor = "orange";
          const slashX = this.x - cameraX + (this.facing === 1 ? this.w : -24);
          ctx.fillRect(slashX, this.y + 10, 28, 8);
          ctx.fillStyle = "#ffaa33";
          ctx.fillRect(slashX + (this.facing === 1 ? 20 : -8), this.y + 8, 12, 12);
          ctx.shadowBlur = 0;
        }

        // face details
        ctx.fillStyle = "#FFFFFF";
        const eyeX = (this.x - cameraX) + (this.facing === 1 ? 20 : 6);
        ctx.fillRect(eyeX, this.y + 8, 7, 7);
        ctx.fillStyle = "#1a2a32";
        ctx.fillRect(eyeX + 2, this.y + 10, 3, 4);
        ctx.fillStyle = "#b87c4a";
        ctx.fillRect(this.x - cameraX + 5, this.y + 25, 22, 5);
      }

      bounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
      }
    }

    // ----- PLATFORM -----
    class Platform {
      constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
      }
      draw() {
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        ctx.fillStyle = "#C98F5E";
        ctx.fillRect(this.x - cameraX + 3, this.y - 3, this.w - 6, 6);
        for (let i = 0; i < 5; i++) {
          ctx.fillStyle = "#E0AC77";
          ctx.fillRect(this.x - cameraX + 6 + i * 18, this.y + 4, 6, this.h - 6);
        }
        ctx.fillStyle = "#6F9E3F";
        ctx.fillRect(this.x - cameraX, this.y - 5, this.w, 5);
      }
      getBounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
      }
    }

    // ----- ENEMY (patrol, damage player, killed by sword) -----
    class Enemy {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 28;
        this.h = 28;
        this.vx = Math.random() < 0.5 ? -1 : 1;
        this.alive = true;
      }

      update() {
        if (!this.alive) return;

        this.x += this.vx;
        if (this.x < 0 || this.x > 2000) this.vx *= -1;

        // damage player on touch
        if (gameState === "playing") {
          const p = player.bounds();
          if (p.x < this.x + this.w && p.x + p.w > this.x &&
              p.y < this.y + this.h && p.y + p.h > this.y) {
            player.takeDamage();
          }
        }

        // player attack kills enemy
        if (player.attackTimer > 0 && this.alive && gameState === "playing") {
          const attackRange = player.facing === 1 ? 40 : -40;
          const attackLeft = player.x + (player.facing === 1 ? player.w : attackRange);
          const attackRight = player.x + (player.facing === 1 ? player.w + 30 : player.w);
          if (attackLeft < this.x + this.w && attackRight > this.x &&
              player.y < this.y + this.h && player.y + player.h > this.y) {
            this.alive = false;
            score += 50;
            scoreSpan.innerText = score;
            shake = 10;
          }
        }
      }

      draw() {
        if (!this.alive) return;
        ctx.fillStyle = "#3cff5c";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        ctx.fillStyle = "#2a8c3a";
        ctx.fillRect(this.x - cameraX + 4, this.y + 6, 6, 8);
        ctx.fillRect(this.x - cameraX + 18, this.y + 6, 6, 8);
        // angry eyes
        ctx.fillStyle = "#000000";
        ctx.fillRect(this.x - cameraX + 8, this.y + 12, 4, 4);
        ctx.fillRect(this.x - cameraX + 16, this.y + 12, 4, 4);
      }
    }

    // ----- GEM -----
    class Gem {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = 12;
        this.collected = false;
        this.floatOffset = Math.random() * Math.PI * 2;
      }
      update() {
        if (this.collected) return;
        const p = player.bounds();
        if (p.x < this.x + this.size && p.x + p.w > this.x &&
            p.y < this.y + this.size && p.y + p.h > this.y) {
          this.collected = true;
          score += 10;
          scoreSpan.innerText = score;
          shake = 4;
        }
      }
      draw(time) {
        if (this.collected) return;
        const bob = Math.sin(time * 0.008 + this.floatOffset) * 3;
        ctx.fillStyle = "#2effbc";
        ctx.shadowBlur = 6;
        ctx.shadowColor = "#b0ffd0";
        ctx.fillRect(this.x - cameraX, this.y + bob, this.size, this.size);
        ctx.fillStyle = "#FFE484";
        ctx.fillRect(this.x - cameraX + 2, this.y + bob + 2, this.size - 4, this.size - 4);
        ctx.fillStyle = "#FFB347";
        ctx.fillRect(this.x - cameraX + 4, this.y + bob + 4, 4, 4);
        ctx.shadowBlur = 0;
      }
    }

    // ----- WORLD -----
    let player;
    let platforms = [];
    let enemies = [];
    let gems = [];

    function buildWorld() {
      player = new Player();

      // platforms designed to be reachable with new jump (max height ~187px)
      platforms = [
        new Platform(0, 360, 2000, 40),   // ground
        new Platform(300, 300, 100, 20),  // 60px above ground
        new Platform(600, 250, 120, 20),  // 110px above ground
        new Platform(900, 210, 100, 20),  // 150px above ground
        new Platform(1200, 270, 140, 20), // 90px above ground
        new Platform(1500, 230, 100, 20), // 130px above ground
        new Platform(1700, 320, 80, 20)   // small step
      ];

      enemies = [
        new Enemy(500, 332),
        new Enemy(1000, 332),
        new Enemy(1400, 332),
        new Enemy(1750, 292)
      ];

      gems = [
        new Gem(320, 260), new Gem(650, 210), new Gem(950, 170),
        new Gem(1300, 230), new Gem(1550, 190), new Gem(1780, 280)
      ];
    }

    // ----- COLLISION (with landing impact shake) -----
    function resolveCollisions() {
      if (!player) return;
      let wasOnGround = player.onGround;
      player.onGround = false;

      for (let p of platforms) {
        const b = player.bounds();
        const plat = p.getBounds();

        if (b.x < plat.x + plat.w && b.x + b.w > plat.x &&
            b.y < plat.y + plat.h && b.y + b.h > plat.y) {

          // vertical landing (top)
          if (player.vy >= 0 && b.y + b.h - player.vy <= plat.y) {
            player.y = plat.y - b.h;
            player.vy = 0;
            player.onGround = true;
            // LANDING IMPACT JUICE: heavy landing causes shake
            if (!wasOnGround && player.vy > 8) {
              shake = 6;
            }
          }
          // head bump
          else if (player.vy < 0 && b.y - player.vy >= plat.y + plat.h) {
            player.y = plat.y + plat.h;
            player.vy = 0;
          }
          // horizontal push
          else if (b.x < plat.x) {
            player.x = plat.x - b.w;
          } else if (b.x + b.w > plat.x + plat.w) {
            player.x = plat.x + plat.w;
          }
        }
      }

      // world boundaries
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > 2000) player.x = 2000 - player.w;

      // fall death
      if (player.y + player.h > canvas.height + 100 && gameState === "playing") {
        player.takeDamage();
        if (player.hp > 0) {
          player.x = 100;
          player.y = 300;
          player.vy = 0;
          player.vx = 0;
        }
      }
      if (player.y < 0) player.y = 0;
    }

    // ----- UPDATE LOGIC (only if playing) -----
    function updateGame() {
      if (gameState !== "playing") return;

      player.update();
      resolveCollisions();

      for (let e of enemies) e.update();
      for (let g of gems) g.update();

      // win condition: all gems collected
      const allGemsCollected = gems.every(g => g.collected);
      if (allGemsCollected && gameState === "playing") {
        gameState = "win";
      }

      // smooth camera target
      let desiredCam = player.x - canvas.width / 2;
      desiredCam = Math.max(0, Math.min(desiredCam, 2000 - canvas.width));
      targetCameraX = desiredCam;
      cameraX += (targetCameraX - cameraX) * 0.08; // smooth interpolation
    }

    // ----- DRAW EVERYTHING (background, HUD, screens) -----
    let animationTime = 0;
    function draw() {
      ctx.save();

      // screen shake
      if (shake > 0) {
        ctx.translate(Math.random() * shake - shake / 2, Math.random() * shake - shake / 2);
        shake *= 0.9;
      }

      // sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, "#83c5ff");
      grad.addColorStop(1, "#4696e5");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // parallax clouds
      ctx.fillStyle = "#ffffffd9";
      ctx.beginPath();
      ctx.ellipse(90 - cameraX * 0.3, 55, 45, 32, 0, 0, Math.PI * 2);
      ctx.ellipse(140 - cameraX * 0.3, 45, 52, 38, 0, 0, Math.PI * 2);
      ctx.ellipse(185 - cameraX * 0.3, 60, 40, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(640 - cameraX * 0.3, 75, 58, 38, 0, 0, Math.PI * 2);
      ctx.ellipse(700 - cameraX * 0.3, 65, 50, 35, 0, 0, Math.PI * 2);
      ctx.fill();

      // sun
      ctx.fillStyle = "#ffffc0";
      ctx.beginPath();
      ctx.arc(730 - cameraX * 0.2, 38, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffe68f";
      ctx.beginPath();
      ctx.arc(730 - cameraX * 0.2, 38, 22, 0, Math.PI * 2);
      ctx.fill();

      // world objects
      for (let p of platforms) p.draw();
      for (let g of gems) g.draw(performance.now());
      for (let e of enemies) e.draw();
      player.draw();

      // UI: remaining gems
      const remaining = gems.filter(g => !g.collected).length;
      ctx.font = "bold 14px system-ui, monospace";
      ctx.fillStyle = "#2e3820";
      ctx.fillText(`✨ ${remaining} left`, canvas.width - 88, 28);
      ctx.fillStyle = "#fff3bf";
      ctx.fillText(`✨ ${remaining} left`, canvas.width - 90, 26);

      // health hearts
      for (let i = 0; i < player.hp; i++) {
        ctx.fillStyle = "#ff4d4d";
        ctx.fillRect(20 + i * 28, 20, 22, 22);
        ctx.fillStyle = "#ff8888";
        ctx.fillRect(23 + i * 28, 24, 16, 14);
      }

      // game over / win screens
      ctx.textAlign = "center";
      if (gameState === "dead") {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff4d4d";
        ctx.font = "bold 38px system-ui, monospace";
        ctx.fillText("💀 GAME OVER 💀", canvas.width / 2, 160);
        ctx.font = "18px system-ui";
        ctx.fillStyle = "#ffaa66";
        ctx.fillText("Press [ R ] to restart", canvas.width / 2, 230);
      }

      if (gameState === "win") {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffe066";
        ctx.font = "bold 38px system-ui, monospace";
        ctx.fillText("✨ VICTORY! ✨", canvas.width / 2, 160);
        ctx.font = "18px system-ui";
        ctx.fillStyle = "#ffdd88";
        ctx.fillText("All gems collected!", canvas.width / 2, 220);
        ctx.font = "16px system-ui";
        ctx.fillStyle = "white";
        ctx.fillText("Press R to play again", canvas.width / 2, 280);
      }

      ctx.restore();
    }

    // ----- RESET FUNCTION -----
    function resetGame() {
      gameState = "playing";
      score = 0;
      scoreSpan.innerText = "0";
      buildWorld();
      cameraX = 0;
      targetCameraX = 0;
      shake = 0;
      coyoteTime = 0;
      jumpBuffer = 0;
    }

    // ----- GAME LOOP -----
    function gameLoop() {
      updateGame();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ----- INITIALIZE -----
    buildWorld();
    gameLoop();
  })();
</script>
</body>
