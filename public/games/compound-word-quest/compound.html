<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🧩 Compound Word Quest – Levels</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #e8f4fd;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      font-family: 'Segoe UI', 'Poppins', 'Comic Sans MS', cursive, sans-serif;
    }

    .screen {
      background: white;
      border-radius: 28px;
      padding: 20px 24px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 100, 200, 0.12);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      min-height: 85vh;
      justify-content: center;
    }

    h1, h2 {
      color: #1565c0;
      text-align: center;
      margin-bottom: 12px;
    }

    .level-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin: 20px 0;
    }

    .level-card {
      background: linear-gradient(145deg, #fff, #e3f2fd);
      border-radius: 24px;
      padding: 20px 25px;
      min-width: 130px;
      cursor: pointer;
      transition: 0.25s;
      border: 2px solid #bbdefb;
      text-align: center;
      position: relative;
    }

    .level-card:hover:not(.locked-level) {
      transform: translateY(-6px);
      border-color: #1565c0;
      background: #e3f2fd;
    }

    .level-card.locked-level {
      opacity: 0.6;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    .lock-badge {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 1.2rem;
    }

    .score-panel {
      background: #1565c0;
      border-radius: 50px;
      display: inline-flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 20px;
      margin-bottom: 20px;
      color: white;
      width: 100%;
    }

    .score-value {
      font-size: 1.6rem;
      font-weight: 800;
      background: #ffeb3b;
      color: #1565c0;
      padding: 0 16px;
      border-radius: 40px;
      min-width: 80px;
      text-align: center;
    }

    .emoji-pair {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 4rem;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .plus {
      font-size: 2.5rem;
      color: #90a4ae;
    }

    .hint {
      font-size: 0.9rem;
      color: #1565c0;
      background: #e3f2fd;
      text-align: center;
      padding: 8px 12px;
      border-radius: 40px;
      margin: 10px 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .option-btn {
      background: white;
      border: 2px solid #bbdefb;
      border-radius: 16px;
      padding: 12px 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-weight: 500;
      color: #1565c0;
      font-family: inherit;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #1565c0;
      background: #e3f2fd;
      transform: scale(1.02);
    }

    .option-btn:active {
      transform: scale(0.97);
    }

    .option-btn.wrong {
      background: #ffebee;
      border-color: #e57373;
      color: #c62828;
    }

    .feedback {
      background: #f0f7ff;
      border-radius: 50px;
      padding: 8px;
      text-align: center;
      margin: 12px 0;
      color: #1565c0;
      font-weight: bold;
    }

    .btn {
      background: #1565c0;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
      margin: 8px auto;
      display: inline-block;
    }

    .btn:hover {
      background: #0d47a1;
      transform: scale(1.02);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .progress {
      font-size: 0.8rem;
      color: #888;
      text-align: right;
      margin-bottom: 8px;
    }

    footer {
      margin-top: 16px;
      font-size: 0.7rem;
      text-align: center;
      color: #90a4ae;
    }

    /* Celebration popup */
    .celebration-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #ffd700, #ffb347);
      color: #fff;
      padding: 20px 32px;
      border-radius: 60px;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      z-index: 10000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: fadeInOut 3s ease forwards;
      pointer-events: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); visibility: hidden; }
    }

    @media (max-width: 480px) {
      .screen { padding: 16px; min-height: 70vh; }
      .emoji-pair { font-size: 2.8rem; gap: 12px; }
      .plus { font-size: 1.8rem; }
      .option-btn { font-size: 0.85rem; padding: 10px 6px; }
      .celebration-popup { font-size: 1.2rem; padding: 12px 20px; white-space: normal; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  // ========== 4 LEVELS WITH LESS OBVIOUS EMOJIS (all celebration fields present) ==========
  const levelsDB = {
    1: [
      { p1: "sun", e1: "☀️", p2: "flower", e2: "🌸", a: "sunflower", o: ["sunflower","sunlight","sunbeam","sunshine"], hint: "A tall yellow plant that faces the sun", celebration: "🌻" },
      { p1: "tooth", e1: "🦷", p2: "brush", e2: "🧹", a: "toothbrush", o: ["toothpaste","toothbrush","toothpick","toothache"], hint: "Use this to clean your teeth", celebration: "🪥" },
      { p1: "rain", e1: "💧", p2: "coat", e2: "👔", a: "raincoat", o: ["rainbow","raincoat","raindrop","rainfall"], hint: "Waterproof jacket for wet weather", celebration: "🧥" },
      { p1: "bed", e1: "🛏️", p2: "room", e2: "🚪", a: "bedroom", o: ["bathroom","bedroom","playroom","classroom"], hint: "Where you sleep at night", celebration: "🛌" },
      { p1: "foot", e1: "🦶", p2: "ball", e2: "🔴", a: "football", o: ["football","baseball","handball","meatball"], hint: "The most popular sport in the world", celebration: "⚽" },
      { p1: "fire", e1: "🔥", p2: "work", e2: "💼", a: "firework", o: ["firework","fireplace","fireman","fireside"], hint: "Colorful explosions in the sky", celebration: "🎆" },
      { p1: "butter", e1: "🧀", p2: "fly", e2: "🦟", a: "butterfly", o: ["butterfly","buttercup","buttertoe","buttermilk"], hint: "A beautiful insect with colorful wings", celebration: "🦋" },
      { p1: "sea", e1: "🌊", p2: "horse", e2: "🐎", a: "seahorse", o: ["seahorse","seashell","seabird","seaweed"], hint: "A tiny marine animal that swims upright", celebration: "🐠" },
      { p1: "star", e1: "⭐", p2: "fish", e2: "🐟", a: "starfish", o: ["starfish","starlight","starbird","starfruit"], hint: "A five-armed creature found on beaches", celebration: "🌟" },
      { p1: "book", e1: "📚", p2: "worm", e2: "🐛", a: "bookworm", o: ["bookworm","bookcase","bookmark","bookshelf"], hint: "Someone who loves to read", celebration: "📖" }
    ],
    2: [
      { p1: "cup", e1: "🥤", p2: "cake", e2: "🍰", a: "cupcake", o: ["cupcake","pancake","cheesecake","cupboard"], hint: "A small sweet cake for one person", celebration: "🧁" },
      { p1: "earth", e1: "🌍", p2: "quake", e2: "💥", a: "earthquake", o: ["earthquake","earthworm","earthling","earthwork"], hint: "Shaking of the ground", celebration: "🌋" },
      { p1: "note", e1: "📝", p2: "book", e2: "📘", a: "notebook", o: ["notebook","notepad","notecard","noteworthy"], hint: "Used for writing notes", celebration: "📓" },
      { p1: "play", e1: "🎮", p2: "ground", e2: "🏟️", a: "playground", o: ["playground","playroom","playdate","playoff"], hint: "Area for children to play", celebration: "🛝" },
      { p1: "gold", e1: "🥇", p2: "fish", e2: "🐟", a: "goldfish", o: ["goldfish","goldmine","golden","goldleaf"], hint: "A small orange pet fish", celebration: "🐠" },
      { p1: "hair", e1: "💇", p2: "cut", e2: "✂️", a: "haircut", o: ["haircut","hairband","hairpin","hairbrush"], hint: "Trimming your hair", celebration: "💇‍♂️" },
      { p1: "jelly", e1: "🍮", p2: "fish", e2: "🐡", a: "jellyfish", o: ["jellyfish","jellybean","jellyroll","jelly"], hint: "A sea creature with tentacles", celebration: "🪼" },
      { p1: "lady", e1: "👒", p2: "bug", e2: "🐜", a: "ladybug", o: ["ladybug","ladybird","ladyfinger","ladylike"], hint: "A small red beetle with spots", celebration: "🐞" },
      { p1: "pass", e1: "🎫", p2: "word", e2: "🔤", a: "password", o: ["password","passport","passcode","passenger"], hint: "Secret code to log in", celebration: "🔑" },
      { p1: "row", e1: "🚣", p2: "boat", e2: "🛶", a: "rowboat", o: ["rowboat","rower","rowlock","rowdy"], hint: "A small boat moved by oars", celebration: "🚣" }
    ],
    3: [
      { p1: "back", e1: "🔙", p2: "bone", e2: "🦴", a: "backbone", o: ["backbone","backpack","backyard","backfire"], hint: "The spine; main support", celebration: "🐍" },
      { p1: "candle", e1: "🕯️", p2: "stick", e2: "🏒", a: "candlestick", o: ["candlestick","candleholder","candlewick","candlelight"], hint: "A holder for a candle", celebration: "🕎" },
      { p1: "dragon", e1: "🐉", p2: "fly", e2: "🪰", a: "dragonfly", o: ["dragonfly","dragonfruit","dragonslayer","dragonfire"], hint: "A long-bodied insect with two pairs of wings", celebration: "🐉" },
      { p1: "feather", e1: "🪶", p2: "weight", e2: "⚖️", a: "featherweight", o: ["featherweight","featherbed","featherbrain","feathery"], hint: "Very light weight class", celebration: "🪶" },
      { p1: "grand", e1: "🏛️", p2: "father", e2: "👨", a: "grandfather", o: ["grandfather","grandmother","grandson","grandparent"], hint: "Your parent's father", celebration: "👴" },
      { p1: "horse", e1: "🐴", p2: "power", e2: "⚡", a: "horsepower", o: ["horsepower","horseshoe","horseback","horseplay"], hint: "Unit of engine power", celebration: "🏎️" },
      { p1: "light", e1: "💡", p2: "house", e2: "🏠", a: "lighthouse", o: ["lighthouse","lightbulb","lightyear","lightweight"], hint: "A tower with a bright light for ships", celebration: "🗼" },
      { p1: "mail", e1: "📧", p2: "box", e2: "📦", a: "mailbox", o: ["mailbox","mailman","mailroom","mailbag"], hint: "Where letters are delivered", celebration: "📪" },
      { p1: "over", e1: "⬆️", p2: "flow", e2: "💧", a: "overflow", o: ["overflow","overload","overcast","overdrive"], hint: "To spill over the edge", celebration: "🌊" },
      { p1: "thumb", e1: "👍", p2: "print", e2: "🖨️", a: "thumbprint", o: ["thumbprint","thumbnail","thumbtack","thumbdrive"], hint: "Unique pattern on your finger", celebration: "🖐️" }
    ],
    4: [
      { p1: "after", e1: "⏰", p2: "thought", e2: "💭", a: "afterthought", o: ["afterthought","aftermath","afterlife","afternoon"], hint: "Something thought of later", celebration: "🤔" },
      { p1: "break", e1: "🔨", p2: "water", e2: "💧", a: "breakwater", o: ["breakwater","breakthrough","breakfast","breakdown"], hint: "A barrier protecting a shore from waves", celebration: "🌊" },
      { p1: "butter", e1: "🧈", p2: "scotch", e2: "🥃", a: "butterscotch", o: ["butterscotch","buttercream","butterfly","buttermilk"], hint: "A type of sweet candy", celebration: "🍬" },
      { p1: "cross", e1: "✝️", p2: "word", e2: "🔤", a: "crossword", o: ["crossword","crossfire","crosswalk","crossroads"], hint: "A word puzzle", celebration: "📰" },
      { p1: "dare", e1: "😈", p2: "devil", e2: "👹", a: "daredevil", o: ["daredevil","dareful","daring","daresay"], hint: "A reckless person", celebration: "🤸" },
      { p1: "fore", e1: "⛳", p2: "father", e2: "👨", a: "forefather", o: ["forefather","forehead","foreground","foreword"], hint: "An ancestor", celebration: "🧓" },
      { p1: "honey", e1: "🍯", p2: "moon", e2: "🌙", a: "honeymoon", o: ["honeymoon","honeybee","honeycomb","honeypot"], hint: "A vacation after wedding", celebration: "🍯" },
      { p1: "master", e1: "🎓", p2: "piece", e2: "🧩", a: "masterpiece", o: ["masterpiece","mastermind","masterkey","masterplan"], hint: "A work of outstanding skill", celebration: "🎨" },
      { p1: "silver", e1: "🥈", p2: "smith", e2: "🔨", a: "silversmith", o: ["silversmith","silverware","silverfish","silverline"], hint: "A person who makes silver objects", celebration: "⚒️" },
      { p1: "white", e1: "⚪", p2: "wash", e2: "🧽", a: "whitewash", o: ["whitewash","whiteboard","whitespace","whiteout"], hint: "To cover up mistakes or paint white", celebration: "🎨" }
    ]
  };

  const PASS_SCORE = 700;

  let playerName = "";
  let currentUnlockedLevel = 1;
  let currentLevel = 1;
  let currentScore = 1000;
  let currentQuestionIndex = 0;
  let questionsForLevel = [];
  let isAnswerLock = false;
  let levelCompleted = false;
  let soundEnabled = true;

  // Sound handling (with error fallback)
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'setSound') {
      soundEnabled = e.data.enabled;
    }
  });

  function playCorrectSound() {
    if (!soundEnabled) return;
    try {
      new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3").play().catch(()=>{});
    } catch(e) {}
  }

  function playWrongSound() {
    if (!soundEnabled) return;
    try {
      new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3").play().catch(()=>{});
    } catch(e) {}
  }

  function playCompleteSound() {
    if (!soundEnabled) return;
    try {
      new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3").play().catch(()=>{});
    } catch(e) {}
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Celebration popup (safe)
  function showCelebration(celebrationEmoji, compoundWord) {
    if (!celebrationEmoji) celebrationEmoji = "🎉";
    const popup = document.createElement('div');
    popup.className = 'celebration-popup';
    popup.innerHTML = `${celebrationEmoji} ${compoundWord.toUpperCase()}! ${celebrationEmoji}`;
    document.body.appendChild(popup);
    setTimeout(() => {
      if (popup && popup.remove) popup.remove();
    }, 3000);
  }

  const root = document.getElementById('root');

  function showStart() {
    root.innerHTML = `
      <div class="screen">
        <h1>🧩 Compound Word Quest</h1>
        <p style="color:#666; margin-bottom:16px; text-align:center">Combine two words into one compound word!</p>
        <input id="playerName" placeholder="Your name…">
        <br>
        <button class="btn" id="startBtn" style="display:block; margin:0 auto;">Start Adventure →</button>
        <footer>4 levels · Start 1000 points · Wrong = -50 · Pass 700 to unlock next level</footer>
      </div>
    `;
    document.getElementById('startBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim();
      if (name) {
        playerName = name;
        currentUnlockedLevel = 1;
        showLevelSelect();
      } else {
        alert("Please enter your name to begin!");
      }
    };
  }

  function showLevelSelect() {
    let levelsHtml = '';
    for (let lvl = 1; lvl <= 4; lvl++) {
      const unlocked = lvl <= currentUnlockedLevel;
      levelsHtml += `
        <div class="level-card ${!unlocked ? 'locked-level' : ''}" data-level="${lvl}">
          <div class="level-icon">${lvl === 1 ? '🌱' : lvl === 2 ? '📘' : lvl === 3 ? '🔥' : '🏆'}</div>
          <h3>Level ${lvl} ${lvl === 1 ? '(Easy)' : lvl === 2 ? '(Medium)' : lvl === 3 ? '(Hard)' : '(Expert)'}</h3>
          ${!unlocked ? '<div class="lock-badge">🔒</div>' : ''}
        </div>
      `;
    }
    root.innerHTML = `
      <div class="screen">
        <h2>🌟 Choose Your Difficulty 🌟</h2>
        <div class="level-buttons" id="levelButtons">
          ${levelsHtml}
        </div>
        <button class="btn" id="resetGameBtn">🔄 Restart Adventure</button>
        <div class="feedback" id="levelFeedback">✨ Welcome, ${playerName}! Pick a level. ✨</div>
      </div>
    `;
    document.querySelectorAll('.level-card').forEach(card => {
      const lvl = parseInt(card.dataset.level);
      if (lvl <= currentUnlockedLevel) {
        card.addEventListener('click', () => startLevel(lvl));
      }
    });
    document.getElementById('resetGameBtn').onclick = () => location.reload();
  }

  function startLevel(level) {
    if (level > currentUnlockedLevel) return;
    currentLevel = level;
    currentScore = 1000;
    currentQuestionIndex = 0;
    isAnswerLock = false;
    levelCompleted = false;
    questionsForLevel = shuffleArray([...levelsDB[level]]);
    showGameScreen();
  }

  function showGameScreen() {
    if (currentQuestionIndex >= questionsForLevel.length) {
      evaluateLevelCompletion();
      return;
    }
    const q = questionsForLevel[currentQuestionIndex];
    const shuffledOptions = shuffleArray([...q.o]);
    root.innerHTML = `
      <div class="screen">
        <div class="score-panel">
          <span>🧩 SCORE</span>
          <span class="score-value" id="gameScore">${currentScore}</span>
        </div>
        <div class="progress">Level ${currentLevel} · Question ${currentQuestionIndex+1}/${questionsForLevel.length}</div>
        <div class="emoji-pair">
          <span>${q.e1}</span>
          <span class="plus">+</span>
          <span>${q.e2}</span>
        </div>
        <div class="hint">💡 ${q.hint}</div>
        <div class="options-grid" id="optionsContainer">
          ${shuffledOptions.map(opt => `<button class="option-btn" data-opt="${opt}">${opt}</button>`).join('')}
        </div>
        <div class="feedback" id="gameFeedback">🔍 Choose the correct compound word</div>
        <footer>Wrong answer = -50 points</footer>
      </div>
    `;
    isAnswerLock = false;
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn, q.a, q.celebration));
    });
  }

  function handleAnswer(btn, correctAnswer, celebrationEmoji) {
    if (isAnswerLock || levelCompleted) return;
    isAnswerLock = true;
    const selected = btn.getAttribute('data-opt');
    if (selected === correctAnswer) {
      document.getElementById('gameFeedback').innerHTML = "✅ CORRECT! Well done!";
      playCorrectSound();
      showCelebration(celebrationEmoji || "🎉", correctAnswer);
      currentQuestionIndex++;
      setTimeout(() => showGameScreen(), 400);
    } else {
      currentScore = Math.max(0, currentScore - 50);
      document.getElementById('gameScore').innerText = currentScore;
      document.getElementById('gameFeedback').innerHTML = `❌ WRONG! -50 points. Score: ${currentScore}`;
      btn.classList.add('wrong');
      playWrongSound();
      setTimeout(() => {
        btn.classList.remove('wrong');
        isAnswerLock = false;
      }, 800);
    }
  }

  function evaluateLevelCompletion() {
    const passed = currentScore >= PASS_SCORE;
    if (passed && currentLevel === currentUnlockedLevel && currentLevel < 4) {
      currentUnlockedLevel = currentLevel + 1;
    }
    const message = passed 
      ? `🎉 Level ${currentLevel} complete! You scored ${currentScore} points. ${currentLevel < 4 ? 'Next level unlocked!' : 'You mastered all levels!'} 🎉`
      : `❌ Level ${currentLevel} failed. You need ${PASS_SCORE} points to advance. You got ${currentScore}. Try again! ❌`;
    root.innerHTML = `
      <div class="screen" style="text-align:center">
        <h2>${passed ? '🏆 Level Complete! 🏆' : '😔 Level Failed'}</h2>
        <p style="font-size:2rem; margin:20px 0">${currentScore} / 1000</p>
        <p style="color:#888; margin-bottom:20px">${message}</p>
        <button class="btn" id="continueBtn">${passed ? (currentLevel < 4 ? 'Next Level →' : 'Play Again') : 'Retry Level'}</button>
        <button class="btn" id="levelSelectBtn" style="background:#6c757d;">← Level Select</button>
      </div>
    `;
    playCompleteSound();
    const percent = Math.round((currentScore / 1000) * 100);
    if (typeof window.parent !== 'undefined') {
      window.parent.postMessage({ type: 'gameComplete', gameId: 'compound', score: percent, total: 100 }, '*');
    }
    document.getElementById('continueBtn').onclick = () => {
      if (passed && currentLevel < 4) {
        startLevel(currentLevel + 1);
      } else if (passed && currentLevel === 4) {
        showLevelSelect();  // Play Again -> back to level select
      } else {
        startLevel(currentLevel);
      }
    };
    document.getElementById('levelSelectBtn').onclick = () => showLevelSelect();
  }

  // Start the app
  showStart();
</script>
</body>
</html>
