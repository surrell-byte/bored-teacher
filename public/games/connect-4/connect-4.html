<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CONNECT FOUR — PRESTIGE EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

:root {
  --bg: #080b12;
  --surface: #0d1220;
  --surface2: #111827;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.18);
  --text: #e8edf5;
  --text-dim: #4a5568;
  --text-mid: #8b98b0;
  --gold: #d4a853;
  --gold-bright: #f0c46a;
  --cell-bg: #06090f;
  --cell-size: min(11.5vw, 78px);
  --gap: calc(var(--cell-size) * 0.14);
  --pad: calc(var(--cell-size) * 0.28);
  --p1-a: #e8445a;
  --p1-b: #b01e33;
  --p2-a: #f5c842;
  --p2-b: #c4920e;
  --radius-board: 28px;
  --radius-card: 32px;
}

body {
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: -20%;
  background:
    radial-gradient(circle at 20% 30%,
      rgba(0,140,255,0.18),
      transparent 30%),
    radial-gradient(circle at 80% 70%,
      rgba(255,0,120,0.16),
      transparent 30%);
  filter: blur(80px);
  animation: ambientMove 12s ease-in-out infinite alternate;
  z-index: -1;
  pointer-events: none;
}

@keyframes ambientMove {
  from { transform: translateY(-20px) scale(1); }
  to   { transform: translateY(20px) scale(1.08); }
}

/* ── NOISE TEXTURE ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.022;
  pointer-events: none;
  z-index: 9999;
}

/* ── AMBIENT GLOWS ── */
.ambient { display: none; }

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── CARD BASE ── */
.card {
  background: linear-gradient(160deg, rgba(17,24,39,0.98), rgba(8,11,18,0.98));
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-card);
  padding: 2.5rem 2.2rem 2.8rem;
  width: min(94vw, 420px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
  backdrop-filter: blur(24px);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
}

/* ── WELCOME ── */
.brand-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 4.8rem);
  letter-spacing: 3px;
  background: linear-gradient(135deg, #d4a853 0%, #f0c46a 40%, #e8b55a 70%, #a07828 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
  margin-bottom: 0.2rem;
}
.brand-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 4px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
  margin: 1.8rem 0;
}

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 0.95rem 1.5rem;
  border-radius: 100px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.92rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  margin-bottom: 0.7rem;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn:hover::after { background: rgba(255,255,255,0.06); }
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, #d4a853, #e8b55a);
  color: #0a0c10;
  box-shadow: 0 8px 24px rgba(212,168,83,0.3);
}
.btn-primary:hover { box-shadow: 0 12px 32px rgba(212,168,83,0.45); transform: translateY(-1px); }
.btn-ghost {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-bright);
  color: var(--text-mid);
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

/* ── SETUP ── */
.setup-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.setup-input {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  padding: 0.8rem 1rem;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.5rem;
}
.setup-input:focus { border-color: var(--gold); }

.color-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.swatch {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: all 0.18s;
  position: relative;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.1); }
.swatch.picked {
  border-color: white;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.2), 0 0 16px rgba(255,255,255,0.1);
  transform: scale(1.12);
}
.swatch::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.9);
  opacity: 0;
  transition: opacity 0.15s;
  font-weight: 900;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.swatch.picked::after { opacity: 1; }

.pvp-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.pvp-col > .setup-label { margin-bottom: 0.5rem; }
.pvp-col > .setup-input { margin-bottom: 0.6rem; font-size: 0.9rem; padding: 0.65rem 0.8rem; }

/* ── DIFFICULTY ── */
.diff-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.5rem;
}
.diff-btn {
  flex: 1;
  padding: 0.55rem 0.4rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
}
.diff-btn:hover { border-color: var(--gold); color: var(--gold); }
.diff-btn.active { background: rgba(212,168,83,0.12); border-color: var(--gold); color: var(--gold-bright); }

/* ── GAME SHELL ── */
#gameWrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 10;
}

/* ── HUD ── */
.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 580px;
  padding: 0 0.3rem;
  margin-bottom: 1rem;
  gap: 0.8rem;
}
.player-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(13,18,32,0.8);
  border: 1px solid var(--border);
  border-radius: 60px;
  padding: 0.5rem 1rem 0.5rem 0.5rem;
  transition: all 0.3s;
  flex: 1;
  min-width: 0;
}
.player-card.active-turn {
  border-color: var(--active-color, var(--gold));
  box-shadow: 0 0 0 1px var(--active-color, var(--gold)), 0 4px 20px rgba(0,0,0,0.3);
}
.p2-card { flex-direction: row-reverse; justify-content: flex-start; }
.player-token {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 12px var(--tok-glow, transparent);
}
.player-info { min-width: 0; overflow: hidden; }
.player-name {
  font-weight: 800;
  font-size: 1.4rem;
  letter-spacing: 0.5px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-score {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  opacity: 0.55;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.p2-card .player-info { text-align: right; }

.hud-center { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.vs-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  line-height: 1;
}
.hud-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-mid);
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
}
.icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--border-bright); color: white; }

/* ── BOARD ── */
.board-frame {
  background:
    linear-gradient(
      145deg,
      rgba(20,30,60,0.65),
      rgba(5,10,25,0.82)
    );
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-board);
  padding: var(--pad);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.08);
  position: relative;
}
.board-frame::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  border-radius: var(--radius-board) var(--radius-board) 0 0;
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(7, var(--cell-size));
  grid-template-rows: repeat(6, var(--cell-size));
  gap: var(--gap);
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%,
      rgba(255,255,255,0.03),
      rgba(0,0,0,0.92));
  box-shadow:
    inset 0 6px 12px rgba(255,255,255,0.04),
    inset 0 -10px 20px rgba(0,0,0,0.9),
    0 0 0 1px rgba(255,255,255,0.03);
  position: relative;
  overflow: hidden;
  transition: background 0.08s;
  cursor: pointer;
}

/* Column hover highlight */
.col-hover .cell { background: #0b1020; }

/* Pieces */
.cell.p1 {
  background: radial-gradient(circle at 35% 30%, #ff6b7f, var(--p1-a) 50%, var(--p1-b));
  box-shadow:
    0 0 25px var(--p1-a),
    0 0 60px var(--p1-a),
    inset 0 6px 10px rgba(255,255,255,0.45),
    inset 0 -10px 18px rgba(0,0,0,0.4);
  animation: dropIn 0.28s cubic-bezier(0.25, 1.4, 0.5, 1);
}
.cell.p1::before {
  content: '';
  position: absolute;
  top: 14%; left: 18%;
  width: 38%; height: 38%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95), transparent 70%);
  filter: blur(4px);
  pointer-events: none;
}
.cell.p2 {
  background: radial-gradient(circle at 35% 30%, #ffd966, var(--p2-a) 50%, var(--p2-b));
  box-shadow:
    0 0 25px var(--p2-a),
    0 0 60px var(--p2-a),
    inset 0 6px 10px rgba(255,255,255,0.45),
    inset 0 -10px 18px rgba(0,0,0,0.4);
  animation: dropIn 0.28s cubic-bezier(0.25, 1.4, 0.5, 1);
}
.cell.p2::before {
  content: '';
  position: absolute;
  top: 14%; left: 18%;
  width: 38%; height: 38%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95), transparent 70%);
  filter: blur(4px);
  pointer-events: none;
}

@keyframes dropIn {
  0% { transform: scale(0.4) translateY(-8px); opacity: 0.3; }
  70% { transform: scale(1.06); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* Preview */
.cell.preview {
  background: rgba(255,255,255,0.06);
  box-shadow:
    inset 0 3px 8px rgba(0,0,0,0.7),
    0 0 12px rgba(255,255,255,0.04);
}

/* Win highlight */
.cell.win {
  animation: winBurst 0.6s ease-out forwards, winPulse 1s 0.6s ease-in-out infinite;
}
@keyframes winBurst {
  0% { transform: scale(1); }
  30% { transform: scale(1.22); box-shadow: 0 0 0 6px rgba(255,215,0,0.5); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1.05); box-shadow: 0 0 0 3px rgba(255,215,0,0.3); }
}
@keyframes winPulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(255,215,0,0.3), 0 0 20px rgba(255,215,0,0.15); }
  50% { box-shadow: 0 0 0 5px rgba(255,215,0,0.5), 0 0 30px rgba(255,215,0,0.25); }
}

/* Game over dim */
.game-over .cell:not(.p1):not(.p2) { opacity: 0.4; }
.game-over .col-hover { pointer-events: none !important; }

/* Drop guide (triangle above hovered col) */
.drop-guide {
  display: none;
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 9px solid var(--guide-color, white);
  filter: drop-shadow(0 -2px 4px var(--guide-color, white));
}

/* ── COLUMN OVERLAYS ── */
.col-overlays {
  position: absolute;
  inset: var(--pad);
  pointer-events: none;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: var(--gap);
  border-radius: calc(var(--radius-board) - var(--pad));
}
.col-overlay {
  pointer-events: all;
  cursor: pointer;
  border-radius: 100px;
  position: relative;
  transition: background 0.15s;
}
.col-overlay::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
  filter: blur(8px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
  border-radius: 100px;
}
.col-overlay:hover::before { opacity: 1; }
.col-overlay:hover { background: rgba(255,255,255,0.03); }
.col-overlay:hover .drop-guide { display: block; }

/* ── CELEBRATION ── */
.celeb-icon { font-size: 4.5rem; display: block; margin-bottom: 0.5rem; animation: float 2s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.celeb-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 3px;
  color: var(--gold-bright);
  margin-bottom: 0.3rem;
}
.celeb-sub { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 2rem; }

/* ── SCORE BAR ── */
.score-bar {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-top: 0.8rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.score-val { font-size: 1.4rem; font-weight: 700; color: var(--text); }

/* ── CELL LABELS ── */
.cell {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}
.cell-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;

  font-family: 'Orbitron', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;

  color: rgba(255,255,255,0.28);

  text-shadow:
    0 0 8px rgba(255,255,255,0.12),
    0 0 16px rgba(255,255,255,0.08);

  letter-spacing: 1px;

  pointer-events: none;
  transition: all 0.25s ease;
}

.cell:hover .cell-label {
  color: rgba(255,255,255,0.75);

  text-shadow:
    0 0 12px rgba(255,255,255,0.35),
    0 0 24px rgba(255,255,255,0.2);

  transform: scale(1.08);
}

.cell.p1 .cell-label,
.cell.p2 .cell-label,
.cell.preview .cell-label,
.cell.col-hover .cell-label { opacity: 0; }

/* ── MOBILE ── */
@media (max-width: 520px) {
  :root { --cell-size: min(12.5vw, 60px); }
  .hud { gap: 0.5rem; }
  .player-card { padding: 0.4rem 0.7rem 0.4rem 0.4rem; }
  .player-token { width: 28px; height: 28px; }
  .player-name { font-size: 0.78rem; }
}
</style>

<style>
  /* ── Back to Hub button (top-left, always visible) ── */
  #gb-back {
    position: fixed; top: 12px; left: 12px; z-index: 99999;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 999px;
    color: #fff; font-family: system-ui, sans-serif;
    font-size: 0.78rem; font-weight: 700;
    padding: 7px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.18s, transform 0.15s;
    text-decoration: none; letter-spacing: 0.03em;
  }
  #gb-back:hover { background: rgba(0,0,0,0.75); transform: translateY(-1px); }
  #gb-back:active { transform: scale(0.95); }

  /* ── Mute button (top-right, only shown if game has audio) ── */
  #gb-mute {
    position: fixed; top: 12px; right: 12px; z-index: 99999;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 999px;
    color: #fff; font-family: system-ui, sans-serif;
    font-size: 0.78rem; font-weight: 700;
    padding: 7px 14px; cursor: pointer;
    display: none; align-items: center; gap: 6px;
    transition: background 0.18s, transform 0.15s;
  }
  #gb-mute:hover { background: rgba(0,0,0,0.75); transform: translateY(-1px); }

  /* ── Score submission overlay ── */
  #gb-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 999999;
    background: rgba(0,0,0,0.72); backdrop-filter: blur(12px);
    align-items: center; justify-content: center;
    font-family: system-ui, sans-serif;
    animation: gb-fadein 0.3s ease both;
  }
  #gb-overlay.show { display: flex; }
  #gb-card {

<script>
(function() {
  'use strict';

  var HUB_URL = '/hub';
  var LS_KEY  = 'eslhub_data';
  var _muted  = false;

  // ── Detect audio elements and show mute button ───────────────
  window.addEventListener('DOMContentLoaded', function() {
    var audioEls = document.querySelectorAll('audio, video');
    if (audioEls.length > 0) {
      document.getElementById('gb-mute').style.display = 'flex';
    }
    // Respect hub's sound setting
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (data.sound === false) {
        _muted = true;
        _applyMute(true);
        document.getElementById('gb-mute').textContent = '🔇 Muted';
      }
    } catch(e) {}
  });

  function _applyMute(muted) {
    var audioEls = document.querySelectorAll('audio, video');
    audioEls.forEach(function(el) { el.muted = muted; });
    // Also set global flag many games check
    if (typeof window.soundEnabled !== 'undefined') window.soundEnabled = !muted;
    if (typeof window.audioEnabled !== 'undefined') window.audioEnabled = !muted;
    if (typeof window.muteSound   !== 'undefined') window.muteSound    = muted;
  }

  // ── XP calculation ───────────────────────────────────────────
  function _calcXP(score, accuracy) {
    var base = Math.min(Math.floor(score / 10), 30);
    var accBonus = accuracy >= 90 ? 20 : accuracy >= 70 ? 10 : accuracy >= 50 ? 5 : 0;
    return Math.max(base + accBonus, 5); // minimum 5 XP for completing
  }

  // ── Save score to localStorage (eslhub_data) ─────────────────
  function _saveScore(gameId, score, accuracy, questions) {
    try {
      var raw  = localStorage.getItem(LS_KEY);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.games) data.games = {};
      var prev = data.games[gameId] || { highScore: 0, completions: 0, lastAccuracy: 0, totalQuestions: 100 };

      data.games[gameId] = {
        highScore:      Math.max(prev.highScore || 0, score),
        completions:    (prev.completions || 0) + 1,
        lastAccuracy:   accuracy,
        totalQuestions: questions || 100,
      };

      // Add XP + coins
      var xpEarned = _calcXP(score, accuracy);
      data.xp     = (data.xp     || 0) + xpEarned;
      data.coins  = (data.coins  || 0) + Math.floor(xpEarned / 2);
      data.lastGame = gameId;

      // Level up check
      var level = data.level || 1;
      var xp    = data.xp;
      function xpForLevel(l) { return 100 + (l - 1) * 50; }
      while (xp >= xpForLevel(level)) { xp -= xpForLevel(level); level++; }
      data.level = level;
      data.xp    = xp;

      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return xpEarned;
    } catch(e) {
      console.warn('GameBridge: could not save score', e);
      return 0;
    }
  }

  // ── Public API ───────────────────────────────────────────────
  window.GameBridge = {

    submitScore: function(opts) {
      var gameId    = opts.gameId    || 'unknown';
      var score     = opts.score     || 0;
      var accuracy  = opts.accuracy  != null ? opts.accuracy  : 100;
      var questions = opts.questions != null ? opts.questions : 1;

      var xpEarned = _saveScore(gameId, score, accuracy, questions);

      // Also notify parent frame if embedded in iframe
      try {
        window.parent.postMessage({
          type:     'gameComplete',
          gameId:   gameId,
          score:    score,
          accuracy: accuracy,
          xp:       xpEarned,
        }, '*');
      } catch(e) {}

      // Update overlay UI
      document.getElementById('gb-score-val').textContent = score.toLocaleString();
      document.getElementById('gb-acc-val').textContent   = accuracy < 100 ? accuracy + '%' : '✓';
      document.getElementById('gb-xp-val').textContent    = '+' + xpEarned;

      // Pick emoji based on performance
      var emoji = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🎉' : accuracy >= 50 ? '👍' : '💪';
      document.getElementById('gb-emoji').textContent = emoji;

      // Show overlay
      var overlay = document.getElementById('gb-overlay');
      overlay.classList.add('show');
    },

    toggleMute: function() {
      _muted = !_muted;
      _applyMute(_muted);
      var btn = document.getElementById('gb-mute');
      btn.textContent = _muted ? '🔇 Muted' : '🔊 Sound';
      try {
        var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        data.sound = !_muted;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } catch(e) {}
    },

    goHub: function() {
      window.location.href = HUB_URL;
    },

    replay: function() {
      document.getElementById('gb-overlay').classList.remove('show');
      window.location.reload();
    },

    isMuted: function() { return _muted; },
  };

})();
</script>

<body>

<div class="ambient amb-1"></div>
<div class="ambient amb-2"></div>

<!-- WELCOME -->
<div class="screen active" id="sWelcome">

<div class="screen" id="sSetup">
  <div class="card">
    <div class="brand-mark" style="font-size:2rem; margin-bottom:0.1rem;">CUSTOMIZE</div>

  </div>
</div>

<!-- GAME -->
<div id="gameWrap">
  <div class="hud" id="hud">
    <div class="player-card" id="p1Card">
      <div class="player-token" id="p1Tok"></div>
      <div class="player-info">
        <div class="player-name" id="p1Label">Player 1</div>
        <div class="player-score" id="p1Score">0 wins</div>
      </div>
    </div>
    <div class="hud-center">
      <div class="vs-badge">VS</div>
      <div class="hud-actions">
        <div class="icon-btn" title="Reset" onclick="resetGame()">⟳</div>
        <div class="icon-btn" title="Home" onclick="goHome()">⌂</div>
      </div>
    </div>
    <div class="player-card p2-card" id="p2Card">
      <div class="player-token" id="p2Tok"></div>
      <div class="player-info">
        <div class="player-name" id="p2Label">Player 2</div>
        <div class="player-score" id="p2Score">0 wins</div>
      </div>
    </div>
  </div>

  <div class="board-frame" id="boardFrame">
    <div class="board-grid" id="boardGrid"></div>
    <div class="col-overlays" id="colOverlays"></div>
  </div>
</div>

<script>
// ═══════════════ STATE ═══════════════
const ROWS=6, COLS=7;
let board, cur, active, mode, aiDiff, aiTimer;
let p1Name, p2Name, p1Theme, p2Theme;
let scores = {p1:0, p2:0, draws:0};

const themes = {
  crimson:  { a:'#e8445a', b:'#8b1a2a', label:'Crimson' },
  amber:    { a:'#f5c842', b:'#a86d0a', label:'Amber' },
  cobalt:   { a:'#4d9aff', b:'#1a4db5', label:'Cobalt' },
  jade:     { a:'#3de8a0', b:'#0a7a4a', label:'Jade' },
  violet:   { a:'#b87dff', b:'#5c1fb5', label:'Violet' },
  coral:    { a:'#ff7c52', b:'#b53a1a', label:'Coral' },
  ice:      { a:'#dff6ff', b:'#4db8d4', label:'Ice' },
  sunset:   { a:'#ff9966', b:'#c43a20', label:'Sunset' },
  neon:     { a:'#39ff14', b:'#00852e', label:'Neon' },
  rose:     { a:'#ff85b0', b:'#b52060', label:'Rose' },
};
const themeKeys = Object.keys(themes);

// ═══════════════ SCREENS ═══════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if(id) document.getElementById(id)?.classList.add('active');
  document.getElementById('gameWrap').style.display = (id === null) ? 'flex' : 'none';
}
function showGame() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('gameWrap').style.display = 'flex';
}

// ═══════════════ SETUP ═══════════════
function openSetup(m) {
  mode = m;
  p1Theme = p1Theme || 'crimson';
  p2Theme = p2Theme || 'amber';
  const body = document.getElementById('setupBody');

  if(m === 'ai') {
    body.innerHTML = `
      <div class="setup-label">Your Name</div>
      <input class="setup-input" id="inp1" maxlength="14" value="${p1Name||'Challenger'}" placeholder="Your name">
      <div class="setup-label">Your Colour</div>
      <div class="color-grid" id="cgAI"></div>
      <div class="setup-label">Difficulty</div>
      <div class="diff-row">
        <button class="diff-btn ${aiDiff==='easy'?'active':''}" onclick="setDiff('easy',this)">Easy</button>
        <button class="diff-btn ${(!aiDiff||aiDiff==='medium')?'active':''}" onclick="setDiff('medium',this)">Medium</button>
        <button class="diff-btn ${aiDiff==='hard'?'active':''}" onclick="setDiff('hard',this)">Hard</button>
      </div>
    `;
    if(!aiDiff) aiDiff='medium';
    buildSwatches('cgAI', p1Theme, t => { p1Theme = t; });
  } else {
    body.innerHTML = `
      <div class="pvp-row">
        <div class="pvp-col">
          <div class="setup-label">Player 1</div>
          <input class="setup-input" id="inp1" maxlength="12" value="${p1Name||'Crimson'}" placeholder="Name">
          <div class="setup-label" style="margin-bottom:0.4rem">Colour</div>
          <div class="color-grid" id="cg1"></div>
        </div>
        <div class="pvp-col">
          <div class="setup-label">Player 2</div>
          <input class="setup-input" id="inp2" maxlength="12" value="${p2Name||'Amber'}" placeholder="Name">
          <div class="setup-label" style="margin-bottom:0.4rem">Colour</div>
          <div class="color-grid" id="cg2"></div>
        </div>
      </div>
    `;
    buildSwatches('cg1', p1Theme, t => { p1Theme = t; });
    buildSwatches('cg2', p2Theme, t => { p2Theme = t; });
  }
  showScreen('sSetup');
}

function buildSwatches(containerId, selected, onPick) {
  const c = document.getElementById(containerId);
  themeKeys.forEach(k => {
    const s = document.createElement('div');
    s.className = 'swatch' + (k===selected?' picked':'');
    s.style.background = `radial-gradient(circle at 35% 30%, ${themes[k].a}, ${themes[k].b})`;
    s.onclick = () => {
      c.querySelectorAll('.swatch').forEach(x=>x.classList.remove('picked'));
      s.classList.add('picked');
      onPick(k);
    };
    c.appendChild(s);
  });
}

function setDiff(d, el) {
  aiDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function startGame() {
  const inp1 = document.getElementById('inp1');
  p1Name = inp1?.value.trim() || 'Player 1';
  if(mode==='pvp') {
    const inp2 = document.getElementById('inp2');
    p2Name = inp2?.value.trim() || 'Player 2';
  } else {
    // pick AI theme different from p1
    let keys = themeKeys.filter(k=>k!==p1Theme);
    p2Theme = keys[Math.floor(Math.random()*keys.length)];
    p2Name = 'AI — ' + themes[p2Theme].label;
  }
  scores = {p1:0, p2:0, draws:0};
  applyThemes();
  showGame();
  initGame();
}

function applyThemes() {
  const t1=themes[p1Theme], t2=themes[p2Theme];
  // CSS vars
  document.documentElement.style.setProperty('--p1-a', t1.a);
  document.documentElement.style.setProperty('--p1-b', t1.b);
  document.documentElement.style.setProperty('--p2-a', t2.a);
  document.documentElement.style.setProperty('--p2-b', t2.b);
  // tokens
  document.getElementById('p1Tok').style.cssText = `background: radial-gradient(circle at 35% 30%, ${t1.a}, ${t1.b}); box-shadow: 0 0 10px ${t1.a}55`;
  document.getElementById('p2Tok').style.cssText = `background: radial-gradient(circle at 35% 30%, ${t2.a}, ${t2.b}); box-shadow: 0 0 10px ${t2.a}55`;
  document.getElementById('p1Label').textContent = p1Name;
  document.getElementById('p2Label').textContent = p2Name;
  updateScoreDisplay();
}

// ═══════════════ GAME ENGINE ═══════════════
function initGame() {
  board = Array.from({length:ROWS},()=>Array(COLS).fill(0));
  cur = 1; active = true;
  if(aiTimer) clearTimeout(aiTimer);
  buildBoard();
  updateHUD();
  document.getElementById('boardFrame').classList.remove('game-over');
}

function resetGame() {
  if(aiTimer) clearTimeout(aiTimer);
  initGame();
  if(mode==='ai' && cur===2 && active) scheduleAI();
}

function buildBoard() {
  const grid = document.getElementById('boardGrid');
  const overlays = document.getElementById('colOverlays');
  grid.innerHTML = '';
  overlays.innerHTML = '';

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `c${r}_${c}`;
    const rowLetter = String.fromCharCode(65 + r);
    const label = `${rowLetter}${c + 1}`;
    cell.innerHTML = `<span class="cell-label">${label}</span>`;
    grid.appendChild(cell);
  }

  for(let c=0;c<COLS;c++) {
    const ov = document.createElement('div');
    ov.className = 'col-overlay';
    ov.setAttribute('data-col', c);
    // drop guide arrow
    const guide = document.createElement('div');
    guide.className = 'drop-guide';
    guide.id = `guide${c}`;
    ov.appendChild(guide);

    ov.addEventListener('mouseenter', ()=>hoverCol(c, true));
    ov.addEventListener('mouseleave', ()=>hoverCol(c, false));
    ov.addEventListener('click', ()=>humanDrop(c));
    overlays.appendChild(ov);
  }
}

function hoverCol(col, enter) {
  if(!active || (mode==='ai'&&cur===2)) return;
  for(let r=0;r<ROWS;r++) {
    const el = document.getElementById(`c${r}_${col}`);
    if(el && !el.classList.contains('p1') && !el.classList.contains('p2')) {
      el.classList.toggle('col-hover', enter);
    }
  }
  const guide = document.getElementById(`guide${col}`);
  if(guide) {
    const t = themes[cur===1?p1Theme:p2Theme];
    guide.style.setProperty('--guide-color', t.a);
    guide.style.borderTopColor = t.a;
  }
  // show preview on lowest cell
  if(enter) {
    const row = topRow(col);
    if(row>=0) {
      const el = document.getElementById(`c${row}_${col}`);
      if(el) el.classList.add('preview');
    }
  } else {
    document.querySelectorAll('.cell.preview').forEach(e=>e.classList.remove('preview','col-hover'));
  }
}

function topRow(col) {
  for(let r=ROWS-1;r>=0;r--) if(!board[r][col]) return r;
  return -1;
}
function colFull(col) { return topRow(col)<0; }
function boardFull() { for(let c=0;c<COLS;c++) if(!colFull(c)) return false; return true; }

function drop(col, player) {
  const row = topRow(col);
  if(row<0) return false;
  board[row][col] = player;
  const el = document.getElementById(`c${row}_${col}`);
  if(el) {
    el.classList.remove('col-hover','preview');
    el.classList.add(player===1?'p1':'p2');
  }
  return row;
}

function checkWin(row, col, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for(let [dr,dc] of dirs) {
    let cells=[{row,col}];
    for(let s of [1,-1]) {
      let r=row+dr*s, c=col+dc*s;
      while(r>=0&&r<ROWS&&c>=0&&c<COLS&&board[r][c]===p) {
        cells.push({row:r,col:c}); r+=dr*s; c+=dc*s;
      }
    }
    if(cells.length>=4) return cells.slice(0,4);
  }
  return null;
}

function humanDrop(col) {
  if(!active) return;
  if(mode==='ai'&&cur===2) return;
  if(colFull(col)) return;
  document.querySelectorAll('.cell.preview,.cell.col-hover').forEach(e=>e.classList.remove('preview','col-hover'));
  const row = drop(col, cur);
  if(row===false) return;
  afterDrop(row, col);
}

function afterDrop(row, col) {
  const win = checkWin(row, col, cur);
  if(win) {
    active = false;
    document.getElementById('boardFrame').classList.add('game-over');
    win.forEach(({row:r,col:c})=>document.getElementById(`c${r}_${c}`)?.classList.add('win'));
    const isP1 = cur===1;
    if(isP1) scores.p1++; else scores.p2++;
    updateScoreDisplay();
    const colors = isP1 ? [themes[p1Theme].a, '#fff'] : [themes[p2Theme].a, '#fff'];
    setTimeout(()=>{
      confetti({particleCount:180,spread:70,origin:{y:0.55},colors,useWorker:false});
      document.getElementById('celebIcon').textContent = isP1 ? '🏆' : (mode==='ai'?'💀':'🏆');
      document.getElementById('celebTitle').textContent = (isP1?p1Name:p2Name).toUpperCase();
      document.getElementById('celebSub').textContent = mode==='ai'&&!isP1 ? 'The AI wins this round.' : 'Exceptional play.';
      showScreen('sCeleb');
    }, 1100);
    return;
  }
  if(boardFull()) {
    active = false;
    scores.draws++;
    updateScoreDisplay();
    setTimeout(()=>{
      document.getElementById('celebIcon').textContent = '🤝';
      document.getElementById('celebTitle').textContent = 'DRAW';
      document.getElementById('celebSub').textContent = 'An equal match.';
      showScreen('sCeleb');
    }, 800);
    return;
  }
  cur = cur===1 ? 2 : 1;
  updateHUD();
  if(mode==='ai' && cur===2 && active) scheduleAI();
}

// ═══════════════ AI (minimax) ═══════════════
function scheduleAI() {
  const delay = aiDiff==='easy'?900 : aiDiff==='hard'?300 : 580;
  aiTimer = setTimeout(runAI, delay);
}

function runAI() {
  if(!active||cur!==2||mode!=='ai') return;
  let col;
  if(aiDiff==='easy') col = easyAI();
  else if(aiDiff==='hard') col = bestMove(7);
  else col = bestMove(5);
  document.querySelectorAll('.cell.preview,.cell.col-hover').forEach(e=>e.classList.remove('preview','col-hover'));
  const row = drop(col, 2);
  afterDrop(row, col);
}

function easyAI() {
  // 40% smart, 60% random
  if(Math.random()<0.4) return bestMove(3);
  const avail = [];
  for(let c=0;c<COLS;c++) if(!colFull(c)) avail.push(c);
  return avail[Math.floor(Math.random()*avail.length)];
}

function bestMove(depth) {
  // Win immediately?
  for(let c=0;c<COLS;c++) {
    if(colFull(c)) continue;
    const r=topRow(c); board[r][c]=2;
    const w=checkWin(r,c,2);
    board[r][c]=0;
    if(w) return c;
  }
  // Block opponent win?
  for(let c=0;c<COLS;c++) {
    if(colFull(c)) continue;
    const r=topRow(c); board[r][c]=1;
    const w=checkWin(r,c,1);
    board[r][c]=0;
    if(w) return c;
  }
  // Minimax
  let best=-Infinity, bestCol=3;
  for(let c=0;c<COLS;c++) {
    if(colFull(c)) continue;
    const r=topRow(c);
    board[r][c]=2;
    const score=minimax(depth-1,false,-Infinity,Infinity);
    board[r][c]=0;
    if(score>best) { best=score; bestCol=c; }
  }
  return bestCol;
}

function minimax(depth,isMax,alpha,beta) {
  // terminal check
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(board[r][c]===2&&checkWin(r,c,2)) return 1000+depth;
    if(board[r][c]===1&&checkWin(r,c,1)) return -(1000+depth);
  }
  if(boardFull()||depth===0) return evalBoard();
  if(isMax) {
    let v=-Infinity;
    for(let c=0;c<COLS;c++) {
      if(colFull(c)) continue;
      const r=topRow(c); board[r][c]=2;
      v=Math.max(v,minimax(depth-1,false,alpha,beta));
      board[r][c]=0;
      alpha=Math.max(alpha,v);
      if(alpha>=beta) break;
    }
    return v;
  } else {
    let v=Infinity;
    for(let c=0;c<COLS;c++) {
      if(colFull(c)) continue;
      const r=topRow(c); board[r][c]=1;
      v=Math.min(v,minimax(depth-1,true,alpha,beta));
      board[r][c]=0;
      beta=Math.min(beta,v);
      if(alpha>=beta) break;
    }
    return v;
  }
}

function evalBoard() {
  let score=0;
  // center preference
  for(let r=0;r<ROWS;r++) { if(board[r][3]===2) score+=3; if(board[r][3]===1) score-=3; }
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) for(let[dr,dc] of dirs) {
    let ai=0,hu=0;
    for(let i=0;i<4;i++) {
      const nr=r+dr*i, nc=c+dc*i;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) { ai=-10; hu=-10; break; }
      if(board[nr][nc]===2) ai++;
      else if(board[nr][nc]===1) hu++;
    }
    if(hu===0) score += ai===4?100:ai===3?5:ai===2?2:0;
    if(ai===0) score -= hu===4?100:hu===3?5:hu===2?2:0;
  }
  return score;
}

function updateHUD() {
  const t1=themes[p1Theme], t2=themes[p2Theme];
  const p1Active = cur===1&&active;
  const p2Active = cur===2&&active;
  const p1Card = document.getElementById('p1Card');
  const p2Card = document.getElementById('p2Card');
  p1Card.classList.toggle('active-turn', p1Active);
  p2Card.classList.toggle('active-turn', p2Active);
  p1Card.style.setProperty('--active-color', t1.a);
  p2Card.style.setProperty('--active-color', t2.a);
}

function updateScoreDisplay() {
  document.getElementById('p1Score').textContent = `${scores.p1} win${scores.p1!==1?'s':''}`;
  document.getElementById('p2Score').textContent = `${scores.p2} win${scores.p2!==1?'s':''}`;
}

}
