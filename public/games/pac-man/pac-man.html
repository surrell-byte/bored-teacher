<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Pac-Man - Classic Arcade Game</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    background: linear-gradient(145deg, #0a0f1e 0%, #03060c 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', 'VT323', monospace;
    overflow: hidden;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    border-radius: 48px;
    background: rgba(0, 0, 0, 0.6);
    box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  h1 {
    font-family: 'Courier New', monospace;
    font-size: 2.8rem;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #f9e45b, #ffb347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 12px #ffb34780;
    margin-bottom: 12px;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border-radius: 20px;
    box-shadow: 0 0 0 3px #2c2e3a, 0 0 0 6px #f3c15a, 0 20px 30px rgba(0,0,0,0.5);
    background-color: #000;
  }

  .info-panel {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    width: 100%;
    margin-top: 20px;
    gap: 40px;
    background: #11161fcc;
    backdrop-filter: blur(4px);
    padding: 12px 28px;
    border-radius: 60px;
    border: 1px solid #ffcf4a;
  }

  .score-box, .lives-box {
    font-size: 1.8rem;
    font-weight: bold;
    font-family: monospace;
    background: #000000aa;
    padding: 5px 20px;
    border-radius: 32px;
    letter-spacing: 1px;
  }

  .score-box span, .lives-box span {
    color: #ffde6e;
    margin-right: 10px;
  }

  .score-box #score, .lives-box #lives {
    color: #f5f9ff;
    text-shadow: 0 0 5px #3bc0ff;
    font-weight: bold;
  }

  .controls-hint {
    margin-top: 18px;
    display: flex;
    gap: 28px;
    color: #bdd4ff;
    font-size: 0.9rem;
    background: #00000099;
    padding: 6px 18px;
    border-radius: 50px;
    backdrop-filter: blur(4px);
  }

  .controls-hint kbd {
    background: #1e293b;
    border-radius: 8px;
    padding: 3px 10px;
    font-weight: bold;
    color: #ffd966;
    margin: 0 4px;
    box-shadow: inset 0 1px 0 0 #4a5b7a, 0 1px 2px black;
    font-family: monospace;
  }

  button {
    background: #ffc857;
    border: none;
    font-family: monospace;
    font-weight: bold;
    font-size: 1rem;
    padding: 4px 16px;
    border-radius: 60px;
    cursor: pointer;
    transition: 0.1s linear;
    color: #1f2a3e;
    margin-left: 12px;
  }

  button:hover {
    background: #ffdf8c;
    transform: scale(0.96);
    box-shadow: 0 0 6px gold;
  }

  @media (max-width: 550px) {
    .info-panel { gap: 15px; padding: 8px 18px; }
    .score-box, .lives-box { font-size: 1.2rem; padding: 2px 12px; }
    h1 { font-size: 1.8rem; letter-spacing: 4px; }
  }
</style>

<script>
(function() {
  'use strict';

  var HUB_URL = '/hub';
  var LS_KEY  = 'eslhub_data';
  var _muted  = false;

  // ── Detect audio elements and show mute button ───────────────
  window.addEventListener('DOMContentLoaded', function() {
    var audioEls = document.querySelectorAll('audio, video');
    if (audioEls.length > 0) {
      document.getElementById('gb-mute').style.display = 'flex';
    }
    // Respect hub's sound setting
    try {
      var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (data.sound === false) {
        _muted = true;
        _applyMute(true);
        document.getElementById('gb-mute').textContent = '🔇 Muted';
      }
    } catch(e) {}
  });

  function _applyMute(muted) {
    var audioEls = document.querySelectorAll('audio, video');
    audioEls.forEach(function(el) { el.muted = muted; });
    // Also set global flag many games check
    if (typeof window.soundEnabled !== 'undefined') window.soundEnabled = !muted;
    if (typeof window.audioEnabled !== 'undefined') window.audioEnabled = !muted;
    if (typeof window.muteSound   !== 'undefined') window.muteSound    = muted;
  }

  // ── XP calculation ───────────────────────────────────────────
  function _calcXP(score, accuracy) {
    var base = Math.min(Math.floor(score / 10), 30);
    var accBonus = accuracy >= 90 ? 20 : accuracy >= 70 ? 10 : accuracy >= 50 ? 5 : 0;
    return Math.max(base + accBonus, 5); // minimum 5 XP for completing
  }

  // ── Save score to localStorage (eslhub_data) ─────────────────
  function _saveScore(gameId, score, accuracy, questions) {
    try {
      var raw  = localStorage.getItem(LS_KEY);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.games) data.games = {};
      var prev = data.games[gameId] || { highScore: 0, completions: 0, lastAccuracy: 0, totalQuestions: 100 };

      data.games[gameId] = {
        highScore:      Math.max(prev.highScore || 0, score),
        completions:    (prev.completions || 0) + 1,
        lastAccuracy:   accuracy,
        totalQuestions: questions || 100,
      };

      // Add XP + coins
      var xpEarned = _calcXP(score, accuracy);
      data.xp     = (data.xp     || 0) + xpEarned;
      data.coins  = (data.coins  || 0) + Math.floor(xpEarned / 2);
      data.lastGame = gameId;

      // Level up check
      var level = data.level || 1;
      var xp    = data.xp;
      function xpForLevel(l) { return 100 + (l - 1) * 50; }
      while (xp >= xpForLevel(level)) { xp -= xpForLevel(level); level++; }
      data.level = level;
      data.xp    = xp;

      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return xpEarned;
    } catch(e) {
      console.warn('GameBridge: could not save score', e);
      return 0;
    }
  }

  // ── Public API ───────────────────────────────────────────────
  window.GameBridge = {

    submitScore: function(opts) {
      var gameId    = opts.gameId    || 'unknown';
      var score     = opts.score     || 0;
      var accuracy  = opts.accuracy  != null ? opts.accuracy  : 100;
      var questions = opts.questions != null ? opts.questions : 1;

      var xpEarned = _saveScore(gameId, score, accuracy, questions);

      // Also notify parent frame if embedded in iframe
      try {
        window.parent.postMessage({
          type:     'gameComplete',
          gameId:   gameId,
          score:    score,
          accuracy: accuracy,
          xp:       xpEarned,
        }, '*');
      } catch(e) {}

      // Update overlay UI
      document.getElementById('gb-score-val').textContent = score.toLocaleString();
      document.getElementById('gb-acc-val').textContent   = accuracy < 100 ? accuracy + '%' : '✓';
      document.getElementById('gb-xp-val').textContent    = '+' + xpEarned;

      // Pick emoji based on performance
      var emoji = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🎉' : accuracy >= 50 ? '👍' : '💪';
      document.getElementById('gb-emoji').textContent = emoji;

      // Show overlay
      var overlay = document.getElementById('gb-overlay');
      overlay.classList.add('show');
    },

    toggleMute: function() {
      _muted = !_muted;
      _applyMute(_muted);
      var btn = document.getElementById('gb-mute');
      btn.textContent = _muted ? '🔇 Muted' : '🔊 Sound';
      try {
        var data = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        data.sound = !_muted;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } catch(e) {}
    },

    goHub: function() {
      window.location.href = HUB_URL;
    },

    replay: function() {
      document.getElementById('gb-overlay').classList.remove('show');
      window.location.reload();
    },

    isMuted: function() { return _muted; },
  };

})();
</script>

<body>
<div>
  <div class="game-container">
    <h1>⚡ PAC-MAN ⚡</h1>
    <canvas id="gameCanvas" width="450" height="450"></canvas>
    <div class="info-panel">
      <div class="score-box"><span>🍒 SCORE</span> <span id="score">0</span></div>
      <div class="lives-box"><span>❤️ LIVES</span> <span id="lives">3</span></div>
      <button id="resetBtn">🔄 RESTART</button>
    </div>
    <div class="controls-hint">
      <span><kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> &nbsp; MOVE</span>
      <span><kbd>R</kbd> RESTART</span>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- CONFIG ----------
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // tile settings
    const TILE_SIZE = 30;
    
    // ----- MAZE DESIGN (15x15 classic arcade style) -----
    const RAW_MAZE = [
      "###############",
      "#.............#",
      "#.####.#.####.#",
      "#.#.........#.#",
      "#.#.#######.#.#",
      "#.#...#...#.#.#",
      "##....#.#....##",
      "###.#...#.#.###",
      "#.............#",
      "#.#.#######.#.#",
      "#.#.........#.#",
      "#.####.#.####.#",
      "#.............#",
      "###############"
    ];
    
    const ROWS = RAW_MAZE.length;
    const COLS = RAW_MAZE[0].length;
    
    // set canvas size dynamically
    canvas.width = COLS * TILE_SIZE;
    canvas.height = ROWS * TILE_SIZE;
    
    // Game state structures
    let walls = Array(ROWS).fill().map(() => Array(COLS).fill(false));
    let pellets = Array(ROWS).fill().map(() => Array(COLS).fill(false));
    let totalPellets = 0;
    
    // Starting positions
    const PACMAN_START = { x: 1, y: 1 };
    const GHOST_START = { x: COLS-2, y: ROWS-2 };
    
    let pacman = {
      x: PACMAN_START.x,
      y: PACMAN_START.y,
      dx: 0,
      dy: 0,
      nextDx: 0,
      nextDy: 0
    };
    
    let ghost = {
      x: GHOST_START.x,
      y: GHOST_START.y,
      color: "#FF3A3A"
    };
    
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let winFlag = false;
    let invincibleFrames = 0;        // frames of invincibility after being hit (movement ticks)
    const INVINCIBLE_DURATION = 12;   // ~ 1.5 seconds (movement every 125ms)
    
    // movement throttle interval (classic step-based)
    let moveInterval = null;
    
    // DOM elements
    const scoreSpan = document.getElementById("score");
    const livesSpan = document.getElementById("lives");
    const resetBtn = document.getElementById("resetBtn");
    
    // ---------- UTILITIES ----------
    function initMaze() {
      // reset walls and pellets from RAW_MAZE
      for(let r = 0; r < ROWS; r++) {
        for(let c = 0; c < COLS; c++) {
          const char = RAW_MAZE[r][c];
          if(char === '#') {
            walls[r][c] = true;
            pellets[r][c] = false;
          } else if(char === '.') {
            walls[r][c] = false;
            pellets[r][c] = true;
            totalPellets++;
          } else {
            walls[r][c] = false;
            pellets[r][c] = false;
          }
        }
      }
    }
    
    function resetGameState() {
      // reset pellets counters
      initMaze();                // rebuild walls & pellets fresh
      // reset pacman position & direction
      pacman.x = PACMAN_START.x;
      pacman.y = PACMAN_START.y;
      pacman.dx = 0;
      pacman.dy = 0;
      pacman.nextDx = 0;
      pacman.nextDy = 0;
      
      // reset ghost
      ghost.x = GHOST_START.x;
      ghost.y = GHOST_START.y;
      
      score = 0;
      lives = 3;
      gameActive = true;
      winFlag = false;
      invincibleFrames = 0;
      
      updateScoreUI();
      updateLivesUI();
    }
    
    function updateScoreUI() {
      scoreSpan.textContent = score;
    }
    
    function updateLivesUI() {
      livesSpan.textContent = lives;
    }
    
    function countRemainingPellets() {
      let remaining = 0;
      for(let i = 0; i < ROWS; i++) {
        for(let j = 0; j < COLS; j++) {
          if(pellets[i][j]) remaining++;
        }
      }
      return remaining;
    }
    
    function checkWinCondition() {
      if(!gameActive) return;
      const remaining = countRemainingPellets();
      if(remaining === 0 && totalPellets > 0) {
        gameActive = false;
        winFlag = true;
        if(moveInterval) clearInterval(moveInterval);
        moveInterval = null;
      }
    }
    
    // collision & movement logic
    function canMoveTo(x, y) {
      // boundaries
      if(x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
      return !walls[y][x];
    }
    
    // move pacman based on requested direction (with queue)
    function tryMovePacman() {
      if(!gameActive) return false;
      
      // first, try to apply queued direction if possible
      let desiredDx = pacman.nextDx;
      let desiredDy = pacman.nextDy;
      
      let newX = pacman.x + desiredDx;
      let newY = pacman.y + desiredDy;
      
      if(canMoveTo(newX, newY)) {
        pacman.dx = desiredDx;
        pacman.dy = desiredDy;
        pacman.x = newX;
        pacman.y = newY;
        return true;
      } else {
        // if queued direction blocked, try current direction
        let curX = pacman.x + pacman.dx;
        let curY = pacman.y + pacman.dy;
        if(canMoveTo(curX, curY)) {
          pacman.x = curX;
          pacman.y = curY;
          return true;
        }
      }
      return false;
    }
    
    // eat pellet at pacman position
    function eatPellet() {
      if(!gameActive) return;
      if(pellets[pacman.y][pacman.x]) {
        pellets[pacman.y][pacman.x] = false;
        score += 10;
        updateScoreUI();
        // check win after each pellet
        const remaining = countRemainingPellets();
        if(remaining === 0) {
          gameActive = false;
          winFlag = true;
          if(moveInterval) clearInterval(moveInterval);
          moveInterval = null;
        }
      }
    }
    
    // SMART GHOST AI: moves toward pacman with small randomness
    function moveGhost() {
      if(!gameActive) return;
      
      const possibleMoves = [];
      const dirs = [
        { dx: 1, dy: 0 },  // right
        { dx: -1, dy: 0 }, // left
        { dx: 0, dy: 1 },  // down
        { dx: 0, dy: -1 }  // up
      ];
      
      for(const dir of dirs) {
        const newX = ghost.x + dir.dx;
        const newY = ghost.y + dir.dy;
        if(canMoveTo(newX, newY)) {
          possibleMoves.push({ x: newX, y: newY, dx: dir.dx, dy: dir.dy });
        }
      }
      
      if(possibleMoves.length === 0) return;
      
      // 15% random movement to make it less perfect (classic unpredictability)
      if(Math.random() < 0.15) {
        const rand = Math.floor(Math.random() * possibleMoves.length);
        ghost.x = possibleMoves[rand].x;
        ghost.y = possibleMoves[rand].y;
        return;
      }
      
      // else: chase pacman using Manhattan distance
      let bestMove = possibleMoves[0];
      let bestDist = Math.abs(possibleMoves[0].x - pacman.x) + Math.abs(possibleMoves[0].y - pacman.y);
      
      for(let i = 1; i < possibleMoves.length; i++) {
        const move = possibleMoves[i];
        const dist = Math.abs(move.x - pacman.x) + Math.abs(move.y - pacman.y);
        if(dist < bestDist) {
          bestDist = dist;
          bestMove = move;
        }
      }
      
      ghost.x = bestMove.x;
      ghost.y = bestMove.y;
    }
    
    // handle pacman vs ghost collision (with invincibility protection)
    function handleCollision() {
      if(!gameActive) return;
      if(pacman.x === ghost.x && pacman.y === ghost.y) {
        if(invincibleFrames > 0) return; // invincible, no penalty
        
        // lose life
        lives--;
        updateLivesUI();
        
        if(lives <= 0) {
          gameActive = false;
          winFlag = false;
          if(moveInterval) clearInterval(moveInterval);
          moveInterval = null;
          return;
        }
        
        // respawn positions
        pacman.x = PACMAN_START.x;
        pacman.y = PACMAN_START.y;
        pacman.dx = 0;
        pacman.dy = 0;
        pacman.nextDx = 0;
        pacman.nextDy = 0;
        
        ghost.x = GHOST_START.x;
        ghost.y = GHOST_START.y;
        
        // activate invincibility frames (temporary immunity)
        invincibleFrames = INVINCIBLE_DURATION;
      }
    }
    
    // decrease invincibility timer each move tick
    function updateInvincibility() {
      if(invincibleFrames > 0) {
        invincibleFrames--;
      }
    }
    
    // ONE FULL GAME TICK (move, eat, ghost, collisions)
    function gameTick() {
      if(!gameActive) return;
      
      // 1) move pacman based on queued direction
      tryMovePacman();
      // 2) eat pellet
      eatPellet();
      // 3) move ghost (AI)
      moveGhost();
      // 4) collision after ghost moved
      handleCollision();
      // 5) update invincibility timer
      updateInvincibility();
      // 6) re-check win condition after eating
      if(gameActive && countRemainingPellets() === 0) {
        gameActive = false;
        winFlag = true;
        if(moveInterval) clearInterval(moveInterval);
        moveInterval = null;
      }
      
      // redraw is called via requestAnimationFrame (separate)
    }
    
    // ---------- DRAWING ENGINE (with style) ----------
    function drawWalls() {
      for(let row = 0; row < ROWS; row++) {
        for(let col = 0; col < COLS; col++) {
          if(walls[row][col]) {
            // glossy wall effect
            ctx.fillStyle = "#1a2c4f";
            ctx.fillRect(col * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = "#2e4d7a";
            ctx.fillRect(col * TILE_SIZE + 2, row * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            ctx.fillStyle = "#0c1a2f";
            ctx.fillRect(col * TILE_SIZE + 1, row * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
            // edge highlight
            ctx.strokeStyle = "#4f9eff";
            ctx.lineWidth = 1;
            ctx.strokeRect(col * TILE_SIZE + 1, row * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
          }
        }
      }
    }
    
    function drawPellets() {
      for(let row = 0; row < ROWS; row++) {
        for(let col = 0; col < COLS; col++) {
          if(pellets[row][col]) {
            ctx.beginPath();
            ctx.arc(col * TILE_SIZE + TILE_SIZE/2, row * TILE_SIZE + TILE_SIZE/2, 4, 0, Math.PI*2);
            ctx.fillStyle = "#FFFACD";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ffdd77";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(col * TILE_SIZE + TILE_SIZE/2, row * TILE_SIZE + TILE_SIZE/2, 2, 0, Math.PI*2);
            ctx.fillStyle = "#FFD966";
            ctx.fill();
          }
        }
      }
    }
    
    function drawPacman() {
      const cx = pacman.x * TILE_SIZE + TILE_SIZE/2;
      const cy = pacman.y * TILE_SIZE + TILE_SIZE/2;
      let angle = 0.25 + Math.sin(Date.now() * 0.012) * 0.2; // mouth animation
      
      let directionAngle = 0;
      if(pacman.dx === 1) directionAngle = 0;
      else if(pacman.dx === -1) directionAngle = Math.PI;
      else if(pacman.dy === 1) directionAngle = Math.PI/2;
      else if(pacman.dy === -1) directionAngle = -Math.PI/2;
      
      // invincibility blink (every 0.1 sec flash)
      let pacColor = "#F7D44A";
      if(invincibleFrames > 0 && (Math.floor(Date.now() / 80) % 3 === 0)) {
        pacColor = "#b0e0ff";
      }
      
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(directionAngle);
      ctx.beginPath();
      ctx.arc(0, 0, 13, angle, Math.PI * 2 - angle);
      ctx.lineTo(0, 0);
      ctx.fillStyle = pacColor;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, 13, 0, Math.PI * 2);
      ctx.fillStyle = "#ffb347";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, 13, angle, Math.PI * 2 - angle);
      ctx.lineTo(0, 0);
      ctx.fillStyle = pacColor;
      ctx.fill();
      // eye
      ctx.fillStyle = "#000000";
      ctx.beginPath();
      ctx.arc(6, -6, 2.2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(6.8, -7, 1, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    
    function drawGhost() {
      const cx = ghost.x * TILE_SIZE + TILE_SIZE/2;
      const cy = ghost.y * TILE_SIZE + TILE_SIZE/2;
      
      ctx.fillStyle = ghost.color;
      ctx.beginPath();
      ctx.arc(cx, cy - 4, 12, 0, Math.PI * 2, true);
      ctx.fill();
      ctx.fillRect(cx - 12, cy - 4, 24, 12);
      // jagged bottom
      ctx.beginPath();
      for(let i = -12; i <= 12; i+=6) {
        ctx.lineTo(cx + i, cy + 4);
        ctx.lineTo(cx + i + 3, cy + 10);
      }
      ctx.fill();
      
      // eyes
      ctx.fillStyle = "#FFFFFF";
      ctx.beginPath();
      ctx.arc(cx - 5, cy - 6, 3.5, 0, Math.PI*2);
      ctx.arc(cx + 5, cy - 6, 3.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#1e2b3c";
      ctx.beginPath();
      ctx.arc(cx - 5.5, cy - 6.5, 1.8, 0, Math.PI*2);
      ctx.arc(cx + 4.5, cy - 6.5, 1.8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(cx - 6.5, cy - 7.5, 0.8, 0, Math.PI*2);
      ctx.arc(cx + 3.5, cy - 7.5, 0.8, 0, Math.PI*2);
      ctx.fill();
      
      // blush
      ctx.fillStyle = "#ff8a7a";
      ctx.beginPath();
      ctx.arc(cx - 8, cy - 1, 2, 0, Math.PI*2);
      ctx.arc(cx + 8, cy - 1, 2, 0, Math.PI*2);
      ctx.fill();
    }
    
    function drawStatusMessages() {
      if(!gameActive) {
        ctx.font = "bold 24px 'Courier New', monospace";
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, canvas.height/2-45, canvas.width, 70);
        ctx.fillStyle = winFlag ? "#FFE484" : "#ff7777";
        ctx.font = "bold 26px 'Courier New'";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 3;
        const msg = winFlag ? "✨ YOU WIN! ✨" : "💀 GAME OVER 💀";
        ctx.fillText(msg, canvas.width/2 - ctx.measureText(msg).width/2, canvas.height/2+10);
        ctx.font = "16px monospace";
        ctx.fillStyle = "#bbddff";
        const subMsg = "Press R or click RESTART";
        ctx.fillText(subMsg, canvas.width/2 - ctx.measureText(subMsg).width/2, canvas.height/2+48);
        ctx.shadowBlur = 0;
      } else if(invincibleFrames > 0) {
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "#fff5b0";
        ctx.shadowBlur = 0;
        ctx.fillText("✦ INVINCIBLE ✦", 12, 30);
      }
    }
    
    function drawBackgroundGrid() {
      ctx.fillStyle = "#03060d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i = 0; i < COLS; i++) {
        for(let j = 0; j < ROWS; j++) {
          if(!walls[j][i]) {
            ctx.fillStyle = "#071126";
            ctx.fillRect(i*TILE_SIZE, j*TILE_SIZE, TILE_SIZE-0.5, TILE_SIZE-0.5);
          }
        }
      }
    }
    
    function renderGame() {
      if(!canvas) return;
      drawBackgroundGrid();
      drawWalls();
      drawPellets();
      drawGhost();
      drawPacman();
      drawStatusMessages();
    }
    
    // ---------- INPUT HANDLING ----------
    function setDirection(dx, dy) {
      if(!gameActive) return;
      // queue next movement (works even if wall currently blocks)
      pacman.nextDx = dx;
      pacman.nextDy = dy;
    }
    
    function handleKeyDown(e) {
      const key = e.key;
      e.preventDefault();
      if(key === 'ArrowUp') setDirection(0, -1);
      else if(key === 'ArrowDown') setDirection(0, 1);
      else if(key === 'ArrowLeft') setDirection(-1, 0);
      else if(key === 'ArrowRight') setDirection(1, 0);
      else if(key === 'r' || key === 'R') {
        fullRestart();
      }
    }
    
    function fullRestart() {
      if(moveInterval) clearInterval(moveInterval);
      resetGameState();
      gameActive = true;
      winFlag = false;
      invincibleFrames = 0;
      // restart interval
      moveInterval = setInterval(() => {
        gameTick();
        requestAnimationFrame(renderGame);
      }, 130); // classic speed
      requestAnimationFrame(renderGame);
    }
    
    // ---------- INIT & EVENT LISTENERS ----------
    function initGame() {
      resetGameState();
      gameActive = true;
      winFlag = false;
      invincibleFrames = 0;
      if(moveInterval) clearInterval(moveInterval);
      moveInterval = setInterval(() => {
        gameTick();
        requestAnimationFrame(renderGame);
      }, 130);
      
      window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          handleKeyDown(e);
        }
      });
      
      resetBtn.addEventListener('click', () => {
        fullRestart();
      });
      
      requestAnimationFrame(renderGame);
    }
    
    // initial setup
    initMaze();       // fill initial pellets & walls
    initGame();
  })();
</script>
